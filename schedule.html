<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faith Lock | Schedule</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<style>
* { box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: #f2f4f8; font-size: 0.9rem; color: #1a1a2e; }
header { background: #1a2744; color: white; padding: 0 1rem; display: flex; align-items: center; gap: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.25); flex-wrap: wrap; min-height: 44px; }
header h1 { margin: 0; font-size: 0.95rem; font-weight: 600; letter-spacing: 0.02em; }
nav { display: flex; gap: 0.3rem; align-items: center; flex-wrap: wrap; }
nav a { text-decoration: none; }
nav button { background: transparent; border: 1px solid rgba(255,255,255,0.35); color: rgba(255,255,255,0.75); padding: 0.3rem 0.75rem; cursor: pointer; font-size: 0.82rem; border-radius: 3px; font-family: inherit; transition: all 0.15s; }
nav button:hover { border-color: white; color: white; }
button.logout { background: transparent; border: 1px solid rgba(255,100,100,0.6); color: rgba(255,150,150,0.9); padding: 0.3rem 0.75rem; cursor: pointer; font-size: 0.82rem; border-radius: 3px; font-family: inherit; }
button.logout:hover { border-color: #f88; color: #f88; }
.tnav { background: transparent; border: 1px solid rgba(255,255,255,0.28); color: rgba(255,255,255,0.72); padding: 0.28rem 0.7rem; cursor: pointer; font-size: 0.81rem; border-radius: 3px; font-family: inherit; transition: all 0.15s; }
.tnav:hover { border-color: white; color: white; }
.tnav.active { background: #6b6fa8; border-color: #6b6fa8; color: white; }
.container { max-width: 980px; margin: 1.2rem auto; padding: 0 1rem; }
.card { background: white; border: 1px solid #dde1ea; border-radius: 6px; margin-bottom: 1rem; padding: 1.2rem; box-shadow: 0 1px 4px rgba(26,39,68,0.06); }
.card h3 { margin: 0 0 0.6rem; font-size: 1rem; color: #1a2744; font-weight: 600; }
.section-title { font-weight: 600; font-size: 0.82rem; color: #6b6fa8; text-transform: uppercase; letter-spacing: 0.05em; margin: 1rem 0 0.5rem; border-bottom: 1px solid #eef0f6; padding-bottom: 0.3rem; }
.meta { color: #5a6075; font-size: 0.83rem; margin-bottom: 0.35rem; }
.filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: flex-end; }
.filters label { font-size: 0.8rem; font-weight: 600; color: #4a5070; display: block; margin-bottom: 0.25rem; }
.filters input, .filters select { padding: 0.4rem 0.55rem; border: 1px solid #c8cdd8; border-radius: 4px; font-size: 0.85rem; font-family: inherit; }
.filters input:focus, .filters select:focus { outline: none; border-color: #6b6fa8; }
.form-row { margin-bottom: 0.6rem; }
.form-row label { display: block; font-weight: 600; font-size: 0.8rem; color: #4a5070; margin-bottom: 0.25rem; }
.form-row input, .form-row select, .form-row textarea { width: 100%; padding: 0.45rem 0.6rem; border: 1px solid #c8cdd8; border-radius: 4px; font-size: 0.88rem; font-family: inherit; transition: border-color 0.15s; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: #6b6fa8; box-shadow: 0 0 0 2px rgba(107,111,168,0.12); }
.form-row textarea { height: 64px; resize: vertical; }
input[type=checkbox] { width: auto; accent-color: #1a2744; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
@media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }
.btn { padding: 0.38rem 0.9rem; border: none; cursor: pointer; font-size: 0.84rem; border-radius: 4px; font-family: inherit; font-weight: 500; margin-right: 0.3rem; margin-top: 0.2rem; transition: opacity 0.15s; }
.btn:active { opacity: 0.8; }
.btn-primary   { background: #1a2744; color: white; }
.btn-primary:hover   { background: #243560; }
.btn-green     { background: #2a7a4a; color: white; }
.btn-green:hover     { background: #236040; }
.btn-red       { background: #a02020; color: white; }
.btn-red:hover       { background: #8a1a1a; }
.btn-secondary { background: #eaecf4; color: #333; }
.btn-secondary:hover { background: #d8dcea; }
.btn-blue      { background: #1a4a8a; color: white; }
.btn-blue:hover      { background: #153d75; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th { background: #f2f4f8; text-align: left; padding: 0.5rem 0.6rem; white-space: nowrap; font-weight: 600; color: #4a5070; font-size: 0.8rem; border-bottom: 2px solid #dde1ea; }
td { padding: 0.45rem 0.6rem; border-bottom: 1px solid #eef0f6; vertical-align: top; }
tr:hover td { background: #f8f9fc; }
.add-day-row > td { background: #f8f9fc !important; border-bottom: 2px solid #dde1ea; padding: 0.8rem 0.6rem; }
.status-badge { display: inline-block; padding: 0.18rem 0.55rem; font-size: 0.76rem; font-weight: 600; border-radius: 20px; white-space: nowrap; }
.status-Scheduled      { background: #e4eaf8; color: #1a2744; }
.status-Quoted         { background: #fff3d6; color: #7a4800; }
.status-Awaiting-Parts { background: #ffe8cc; color: #7a3800; }
.status-Pending-Review { background: #fff8c0; color: #6b5a00; }
.status-Flagged        { background: #ffe0e0; color: #900; }
.status-Approved       { background: #d6f2e0; color: #1a5c30; }
.status-In-Progress    { background: #d6f2e0; color: #1a5c30; }
.status-Cancelled      { background: #eee; color: #666; }
.msg { padding: 0.5rem 0.7rem; margin: 0.4rem 0; font-size: 0.85rem; border-radius: 4px; }
.msg.success { background: #d6f2e0; border: 1px solid #8cd8aa; color: #1a5c30; }
.msg.error   { background: #ffe0e0; border: 1px solid #f4aaaa; color: #800; }
.parts-search-wrap { position: relative; margin-bottom: 0.5rem; }
.parts-search-wrap input { width: 100%; padding: 0.45rem 0.6rem; border: 1px solid #c8cdd8; border-radius: 4px; font-size: 0.88rem; font-family: inherit; }
.parts-search-wrap input:focus { outline: none; border-color: #6b6fa8; }
.parts-results { border: 1px solid #c8cdd8; background: white; max-height: 160px; overflow-y: auto; display: none; position: absolute; z-index: 20; width: 100%; box-shadow: 0 4px 12px rgba(26,39,68,0.14); border-radius: 0 0 4px 4px; }
.parts-results div { padding: 0.4rem 0.6rem; cursor: pointer; border-bottom: 1px solid #eef0f6; font-size: 0.85rem; }
.parts-results div:hover { background: #e8eaf8; }
#reopen-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); z-index: 100; overflow-y: auto; }
#reopen-modal > div { background: white; max-width: 700px; margin: 1.5rem auto; padding: 1.5rem; position: relative; border-radius: 6px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
#reopen-modal .close-btn { position: absolute; top: 0.75rem; right: 0.75rem; background: #eaecf4; border: none; font-size: 0.9rem; cursor: pointer; border-radius: 3px; padding: 0.25rem 0.55rem; color: #333; font-family: inherit; }
</style>
</head>
<body>
<header>
  <h1 style="margin:0;font-size:0.9rem;font-weight:600;letter-spacing:0.02em;white-space:nowrap;padding:0.55rem 1rem 0.55rem 0;border-right:1px solid rgba(255,255,255,0.15)">Faith Lock &amp; Safe &nbsp;|&nbsp; Schedule</h1>
  <nav style="display:flex;align-items:center;gap:0.2rem;flex-wrap:wrap;flex:1;padding:0.35rem 0.6rem">
    <a href="admin.html" style="text-decoration:none"><button class="tnav">Assign</button></a>
    <a href="admin.html" style="text-decoration:none"><button class="tnav">Review</button></a>
    <button class="tnav active">Schedule</button>
    <a href="admin.html" style="text-decoration:none"><button class="tnav">Calendar</button></a>
    <a href="accounts.html" style="text-decoration:none"><button class="tnav">Accounts</button></a>
    <a href="admin.html" style="text-decoration:none"><button class="tnav">Reference</button></a>
    <a href="admin.html" style="text-decoration:none"><button class="tnav">Search</button></a>
    <a href="admin.html" style="text-decoration:none"><button class="tnav">Export</button></a>
    <span style="width:1px;height:1rem;background:rgba(255,255,255,0.2);margin:0 0.3rem;display:inline-block"></span>
    <button class="tnav" onclick="loadSchedule()">Refresh</button>
  </nav>
  <button class="logout" onclick="logout()" style="white-space:nowrap;flex-shrink:0">Sign Out</button>
</header>

<div class="container">

  <div class="card">
    <h3>Schedule View</h3>
    <div class="filters">
      <div><label>From</label><input type="date" id="sv-from"></div>
      <div><label>To</label><input type="date" id="sv-to"></div>
      <div>
        <label>Tech</label>
        <select id="sv-tech"><option value="">All Techs</option></select>
      </div>
      <div style="align-self:flex-end">
        <button class="btn btn-secondary" onclick="setScheduleRange('today')">Today</button>
        <button class="btn btn-secondary" onclick="setScheduleRange('week')">This Week</button>
        <button class="btn btn-primary"   onclick="loadSchedule()">Load</button>
      </div>
    </div>
    <div id="schedule-list"><p class="meta">Select a date range and click Load.</p></div>
  </div>

  <div class="card" id="stocking-panel" style="display:none">
    <h3>Parts and Labor Totals <span style="font-weight:400;font-size:0.83rem;color:#5a6075">for loaded date range</span></h3>
    <div id="stocking-content"></div>
  </div>

</div>

<div id="reopen-modal">
  <div>
    <button class="close-btn" onclick="closeReopenModal()">X</button>
    <div id="reopen-content"></div>
  </div>
</div>

<script>
let currentUser   = null;
let allParts      = [];
let allLaborTypes = [];
let allTechs      = [];
let allJobTypes   = [];
let reopenParts   = [];
let reopenLabor   = [];
let reopenCharges = [];
let reopenVisits  = [];

async function init() {
  try {
    const { data: { session }, error: sessErr } = await db.auth.getSession();
    if (sessErr) throw sessErr;
    if (!session) { window.location.href = 'index.html'; return; }
    currentUser = session.user;
    const { data: profile } = await db.from('user_profiles').select('role').eq('id', currentUser.id).single();
    if (!profile || profile.role !== 'admin') { window.location.href = 'index.html'; return; }
    await loadRefData();
    setScheduleRange('week');
  } catch (err) {
    document.querySelector('.container').innerHTML =
      `<div class="msg error" style="margin-top:1rem"><strong>Load error:</strong> ${err.message || JSON.stringify(err)}</div>`;
    console.error('schedule init error:', err);
  }
}

async function loadRefData() {
  const [p, lt, tc, jt] = await Promise.all([
    db.from('parts').select('id,part_name,category,unit,unit_cost').eq('active', true).order('part_name'),
    db.from('labor_types').select('id,labor_type_name,hourly_rate').order('labor_type_name'),
    db.from('techs').select('id,tech_name').eq('active', true).order('tech_name'),
    db.from('job_types').select('id,job_type_name').eq('active', true).order('job_type_name')
  ]);
  allParts      = p.data  || [];
  allLaborTypes = lt.data || [];
  allTechs      = tc.data || [];
  allJobTypes   = jt.data || [];
  const techSel = document.getElementById('sv-tech');
  if (techSel) {
    techSel.innerHTML = '<option value="">All Techs</option>' +
      allTechs.map(t => `<option value="${t.id}">${t.tech_name}</option>`).join('');
  }
}

function setScheduleRange(range) {
  if (range === 'today') {
    const t = today();
    document.getElementById('sv-from').value = t;
    document.getElementById('sv-to').value   = t;
  } else {
    const mon = weekStart();
    const sun = new Date(mon + 'T12:00:00');
    sun.setDate(sun.getDate() + 6);
    document.getElementById('sv-from').value = mon;
    document.getElementById('sv-to').value   = sun.toISOString().split('T')[0];
  }
  loadSchedule();
}

async function loadSchedule() {
  const from   = document.getElementById('sv-from').value;
  const to     = document.getElementById('sv-to').value;
  const techId = document.getElementById('sv-tech').value;
  let query = db.from('jobs')
    .select(`id, job_date, status, scope, is_fixed_price, work_order_number, purchase_order_number,
             assigned_tech_ids,
             accounts!jobs_account_id_fkey(account_name, address),
             job_types(job_type_name),
             job_line_items(item_type,item_id,quantity)`)
    .gte('job_date', from).lte('job_date', to)
    .not('status', 'eq', 'Cancelled')
    .order('job_date');
  if (techId) query = query.contains('assigned_tech_ids', [techId]);
  const { data, error } = await query;
  const el = document.getElementById('schedule-list');
  if (error) {
    el.innerHTML = `<div class="msg error">${error.message}</div>`;
    document.getElementById('stocking-panel').style.display = 'none';
    return;
  }
  if (!data?.length) {
    el.innerHTML = '<p class="meta">No jobs found for this period.</p>';
    document.getElementById('stocking-panel').style.display = 'none';
    return;
  }
  const addDayStatuses = ['Scheduled','In Progress','Awaiting Parts','Flagged'];
  el.innerHTML = `<div style="overflow-x:auto"><table>
    <thead><tr>
      <th>Date</th><th>Account</th><th>Type</th><th>WO</th><th>Status</th><th>Scope</th><th></th>
    </tr></thead>
    <tbody>
    ${data.map(j => `
      <tr>
        <td style="white-space:nowrap">${formatDate(j.job_date)}</td>
        <td>
          <strong>${j.accounts?.account_name || ''}</strong>
          ${j.accounts?.address ? `<br><span style="font-size:0.78rem;color:#5a6075">${j.accounts.address}</span>` : ''}
        </td>
        <td style="font-size:0.83rem">${j.job_types?.job_type_name || ''}</td>
        <td style="font-size:0.82rem;white-space:nowrap">${j.work_order_number || ''}</td>
        <td><span class="status-badge status-${j.status.replace(/ /g,'-')}">${j.status}</span></td>
        <td style="max-width:200px;font-size:0.82rem">${j.scope || ''}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-blue" onclick="openReopen('${j.id}')">Edit</button>
          ${addDayStatuses.includes(j.status)
            ? `<button class="btn btn-secondary" onclick="toggleAddDayForm('${j.id}')">+ Return Visit</button>` : ''}
          ${!['Approved','Pending Review'].includes(j.status)
            ? `<button class="btn btn-red" onclick="deleteJob('${j.id}')">Delete</button>` : ''}
        </td>
      </tr>
      <tr id="add-day-form-${j.id}" class="add-day-row" style="display:none">
        <td colspan="7">
          <div style="font-size:0.83rem;font-weight:600;color:#1a2744;margin-bottom:0.45rem">Schedule a return visit -- this keeps the existing job open and adds a new visit date.</div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:flex-end">
            <div>
              <label style="font-size:0.8rem;font-weight:600;display:block;margin-bottom:0.25rem;color:#4a5070">Return Visit Date</label>
              <input type="date" id="add-day-date-${j.id}" value="${tomorrow()}"
                style="padding:0.4rem 0.55rem;border:1px solid #c8cdd8;border-radius:4px;font-size:0.85rem">
            </div>
            <div style="flex:2;min-width:180px">
              <label style="font-size:0.8rem;font-weight:600;display:block;margin-bottom:0.25rem;color:#4a5070">Notes for this visit (optional)</label>
              <input type="text" id="add-day-notes-${j.id}" placeholder="What needs to happen on this visit..."
                style="width:100%;padding:0.4rem 0.55rem;border:1px solid #c8cdd8;border-radius:4px;font-size:0.85rem">
            </div>
            <div style="display:flex;gap:0.3rem">
              <button class="btn btn-primary"   onclick="saveAddDay('${j.id}')">Save Return Visit</button>
              <button class="btn btn-secondary" onclick="toggleAddDayForm('${j.id}')">Cancel</button>
            </div>
          </div>
          <div id="add-day-msg-${j.id}" style="font-size:0.82rem;margin-top:0.4rem"></div>
        </td>
      </tr>
    `).join('')}
    </tbody>
  </table></div>`;

  // Stocking totals
  const partTotals = {}, laborTotals = {};
  data.forEach(j => {
    (j.job_line_items || []).forEach(i => {
      if (i.item_type === 'Part') {
        const name = allParts.find(p => p.id === i.item_id)?.part_name || i.item_id;
        partTotals[name] = (partTotals[name] || 0) + Number(i.quantity);
      } else if (i.item_type === 'Labor') {
        const name = allLaborTypes.find(l => l.id === i.item_id)?.labor_type_name || i.item_id;
        laborTotals[name] = (laborTotals[name] || 0) + Number(i.quantity);
      }
    });
  });
  const partEntries  = Object.entries(partTotals).sort((a,b)  => a[0].localeCompare(b[0]));
  const laborEntries = Object.entries(laborTotals).sort((a,b) => a[0].localeCompare(b[0]));
  const stockPanel   = document.getElementById('stocking-panel');
  if (!partEntries.length && !laborEntries.length) { stockPanel.style.display = 'none'; return; }
  stockPanel.style.display = '';
  document.getElementById('stocking-content').innerHTML = `
    <p style="font-size:0.83rem;color:#5a6075;margin-bottom:0.8rem">Based on expected parts and labor pre-loaded on assigned jobs.</p>
    <div style="display:flex;gap:2rem;flex-wrap:wrap">
      ${partEntries.length ? `<div style="flex:1;min-width:200px">
        <div class="section-title" style="margin-top:0">Parts Needed</div>
        <table><thead><tr><th>Part</th><th>Total Qty</th></tr></thead>
        <tbody>${partEntries.map(([n,q]) => `<tr><td>${n}</td><td><strong>${q}</strong></td></tr>`).join('')}</tbody>
        </table></div>` : ''}
      ${laborEntries.length ? `<div style="flex:1;min-width:200px">
        <div class="section-title" style="margin-top:0">Labor (hrs)</div>
        <table><thead><tr><th>Type</th><th>Total Hrs</th></tr></thead>
        <tbody>${laborEntries.map(([n,h]) => `<tr><td>${n}</td><td><strong>${h}</strong></td></tr>`).join('')}</tbody>
        </table></div>` : ''}
    </div>`;
}

async function deleteJob(id) {
  if (!confirm('Delete this job? This cannot be undone.')) return;
  await db.from('jobs').delete().eq('id', id);
  loadSchedule();
}

function toggleAddDayForm(jobId) {
  document.querySelectorAll('[id^="add-day-form-"]').forEach(el => {
    if (el.id !== `add-day-form-${jobId}`) el.style.display = 'none';
  });
  const row = document.getElementById(`add-day-form-${jobId}`);
  if (row) row.style.display = row.style.display === 'none' ? '' : 'none';
}

async function saveAddDay(jobId) {
  const date  = document.getElementById(`add-day-date-${jobId}`).value;
  const notes = document.getElementById(`add-day-notes-${jobId}`).value.trim();
  const msg   = document.getElementById(`add-day-msg-${jobId}`);
  if (!date) { msg.innerHTML = '<span style="color:#a02020">Date is required.</span>'; return; }
  const { count } = await db.from('job_visits').select('id', { count: 'exact', head: true }).eq('job_id', jobId);
  await db.from('job_visits').insert({
    job_id: jobId, visit_number: (count || 0) + 1,
    visit_date: date, tech_notes: notes || null
  });
  const { data: job } = await db.from('jobs').select('status').eq('id', jobId).single();
  if (job?.status !== 'Scheduled') {
    await db.from('jobs').update({ status: 'Scheduled', updated_at: new Date().toISOString() }).eq('id', jobId);
  }
  msg.innerHTML = '<span style="color:#2a7a4a;font-weight:600">Visit added.</span>';
  setTimeout(() => { toggleAddDayForm(jobId); loadSchedule(); }, 800);
}

async function openReopen(jobId) {
  reopenParts = []; reopenLabor = []; reopenCharges = []; reopenVisits = [];
  const [{ data: job }, { data: visits }] = await Promise.all([
    db.from('jobs')
      .select(`*, accounts!jobs_account_id_fkey(account_name), job_types(job_type_name),
               job_completions(*), job_line_items(*)`)
      .eq('id', jobId).single(),
    db.from('job_visits').select('*').eq('job_id', jobId).order('visit_number')
  ]);
  reopenVisits = visits || [];
  const comp      = job.job_completions?.[0] || {};
  const laborOpts = allLaborTypes.map(l => `<option value="${l.id}">${l.labor_type_name}</option>`).join('');
  const statusOpts = ['Scheduled','Quoted','Awaiting Parts','Pending Review','Flagged','Approved','Cancelled']
    .map(s => `<option value="${s}" ${s === job.status ? 'selected' : ''}>${s}</option>`).join('');
  (job.job_line_items || []).forEach(i => {
    if (i.item_type === 'Part') {
      const p = allParts.find(x => x.id === i.item_id);
      if (p) reopenParts.push({ id: p.id, name: p.part_name, qty: i.quantity, lineItemId: i.id });
    } else if (i.item_type === 'Labor') {
      const l = allLaborTypes.find(x => x.id === i.item_id);
      if (l) reopenLabor.push({ id: l.id, name: l.labor_type_name, hours: i.quantity, lineItemId: i.id });
    } else {
      reopenCharges.push({ type: i.item_type, description: i.override_reason || '', amount: i.unit_cost, lineItemId: i.id });
    }
  });
  document.getElementById('reopen-content').innerHTML = `
    <h3 style="margin:0 0 0.2rem;color:#1a2744">${job.accounts?.account_name || ''}</h3>
    <div class="meta">${formatDate(job.job_date)} | ${job.job_types?.job_type_name || ''}</div>
    <div class="form-row" style="margin-top:0.8rem"><label>Status</label><select id="ro-status">${statusOpts}</select></div>
    <div class="two-col">
      <div class="form-row"><label>Work Order No.</label><input type="text" id="ro-wo" value="${job.work_order_number || ''}"></div>
      <div class="form-row"><label>Purchase Order No.</label><input type="text" id="ro-po" value="${job.purchase_order_number || ''}"></div>
    </div>
    <div class="form-row"><label>Scope</label><textarea id="ro-scope">${job.scope || ''}</textarea></div>
    <div class="form-row"><label>Site Notes</label><textarea id="ro-sitenotes">${job.site_notes || ''}</textarea></div>
    <div class="section-title">Completion Details</div>
    <div class="two-col">
      <div class="form-row"><label>Time In</label><input type="datetime-local" id="ro-timein" value="${comp.time_in ? comp.time_in.slice(0,16) : ''}"></div>
      <div class="form-row"><label>Time Out</label><input type="datetime-local" id="ro-timeout" value="${comp.time_out ? comp.time_out.slice(0,16) : ''}"></div>
    </div>
    <div class="two-col">
      <div class="form-row"><label>Payment Type</label>
        <select id="ro-paytype"><option value="">-- Select --</option>
          ${['Cash','Check','Card','Invoice'].map(p => `<option ${p === comp.payment_type ? 'selected' : ''}>${p}</option>`).join('')}
        </select>
      </div>
      <div class="form-row"><label>Payment Detail</label><input type="text" id="ro-paydetail" value="${comp.payment_detail || ''}"></div>
    </div>
    <div class="form-row"><label>Tech Notes</label><textarea id="ro-technotes">${comp.tech_notes || ''}</textarea></div>
    <div class="form-row"><label><input type="checkbox" id="ro-followup" ${comp.follow_up_flag ? 'checked' : ''}> Follow-up Flag</label></div>
    <div class="section-title">Visit Times</div>
    ${reopenVisits.length ? reopenVisits.map(v => `
      <div style="background:#f8f9fc;border:1px solid #eef0f6;border-radius:4px;padding:0.6rem;margin-bottom:0.4rem">
        <div style="font-size:0.83rem;font-weight:600;margin-bottom:0.4rem;color:#1a2744">Visit ${v.visit_number} (${formatDate(v.visit_date)})</div>
        <div class="two-col">
          <div class="form-row"><label>Clock In</label>
            <input type="datetime-local" id="vi-cin-${v.id}" value="${v.clocked_in_at ? v.clocked_in_at.slice(0,16) : ''}">
          </div>
          <div class="form-row"><label>Clock Out</label>
            <input type="datetime-local" id="vi-cout-${v.id}" value="${v.clocked_out_at ? v.clocked_out_at.slice(0,16) : ''}">
          </div>
        </div>
      </div>`).join('')
    : '<p class="meta">No clock-in visits on record.</p>'}
    <div class="section-title">Parts</div>
    <div class="parts-search-wrap">
      <input type="text" id="ro-partsearch" placeholder="Search parts to add..." oninput="searchReopenParts()" autocomplete="off">
      <div class="parts-results" id="ro-parts-results"></div>
    </div>
    <table id="ro-parts-table"><thead><tr><th>Part</th><th>Qty</th><th></th></tr></thead><tbody></tbody></table>
    <div class="section-title">Labor</div>
    <div style="display:flex;gap:0.4rem;margin-bottom:0.5rem;flex-wrap:wrap">
      <select id="ro-labortype" style="flex:2;min-width:150px;padding:0.4rem 0.55rem;border:1px solid #c8cdd8;border-radius:4px">
        <option value="">-- Type --</option>${laborOpts}
      </select>
      <input type="number" id="ro-laborhours" placeholder="Hours" style="flex:1;min-width:70px;padding:0.4rem 0.55rem;border:1px solid #c8cdd8;border-radius:4px">
      <button class="btn btn-secondary" onclick="addReopenLabor()">Add</button>
    </div>
    <table id="ro-labor-table"><thead><tr><th>Type</th><th>Hours</th><th></th></tr></thead><tbody></tbody></table>
    <div class="section-title">Additional Charges</div>
    <div style="display:flex;gap:0.4rem;margin-bottom:0.5rem;flex-wrap:wrap;align-items:flex-end">
      <select id="ro-chargetype" style="padding:0.4rem 0.55rem;border:1px solid #c8cdd8;border-radius:4px">
        <option value="Service Call">Service Call</option>
        <option value="Other">Other</option>
      </select>
      <input type="text" id="ro-chargedesc" placeholder="Description" style="flex:2;padding:0.4rem 0.55rem;border:1px solid #c8cdd8;border-radius:4px">
      <input type="number" id="ro-chargeamt" placeholder="$" step="0.01" style="width:85px;padding:0.4rem 0.55rem;border:1px solid #c8cdd8;border-radius:4px">
      <button class="btn btn-secondary" onclick="addReopenCharge()">Add</button>
    </div>
    <table id="ro-charges-table"><thead><tr><th>Type</th><th>Description</th><th>Amount</th><th></th></tr></thead><tbody></tbody></table>
    <div id="ro-msg" style="margin-top:0.6rem"></div>
    <div style="margin-top:1rem;display:flex;gap:0.4rem">
      <button class="btn btn-primary"   onclick="saveReopen('${jobId}','${comp.id || ''}')">Save Changes</button>
      <button class="btn btn-secondary" onclick="closeReopenModal()">Cancel</button>
    </div>`;
  renderReopenParts(); renderReopenLabor(); renderReopenCharges();
  document.getElementById('reopen-modal').style.display = 'block';
}

function closeReopenModal() { document.getElementById('reopen-modal').style.display = 'none'; }

function searchReopenParts() {
  const q   = document.getElementById('ro-partsearch').value.toLowerCase();
  const res = document.getElementById('ro-parts-results');
  if (q.length < 2) { res.style.display = 'none'; return; }
  const matches = allParts.filter(p => p.part_name.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { res.style.display = 'none'; return; }
  res.innerHTML = matches.map(p =>
    `<div data-id="${p.id}" data-name="${p.part_name.replace(/"/g,'&quot;')}">${p.part_name}${p.category ? ' | '+p.category : ''}</div>`
  ).join('');
  res.style.display = 'block';
  res.querySelectorAll('div').forEach(div => {
    div.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); addReopenPart(div.dataset.id, div.dataset.name); });
  });
}
function addReopenPart(id, name) {
  const ex = reopenParts.find(p => p.id === id);
  if (ex) ex.qty += 1; else reopenParts.push({ id, name, qty: 1 });
  renderReopenParts();
  document.getElementById('ro-parts-results').style.display = 'none';
  document.getElementById('ro-partsearch').value = '';
}
function removeReopenPart(idx) { reopenParts.splice(idx, 1); renderReopenParts(); }
function renderReopenParts() {
  document.querySelector('#ro-parts-table tbody').innerHTML = reopenParts.map((p,i) =>
    `<tr><td>${p.name}</td>
     <td><input type="number" min="0.1" step="0.1" value="${p.qty}" style="width:65px;padding:0.25rem 0.35rem;border:1px solid #c8cdd8;border-radius:3px" onchange="reopenParts[${i}].qty=parseFloat(this.value)||1"></td>
     <td><button onclick="removeReopenPart(${i})" style="border:none;background:none;cursor:pointer;color:#a02020;font-weight:bold;font-size:1rem;padding:0.1rem 0.3rem">X</button></td></tr>`
  ).join('') || '<tr><td colspan="3" style="color:#aaa;font-style:italic;font-size:0.83rem">None</td></tr>';
}
function addReopenLabor() {
  const id    = document.getElementById('ro-labortype').value;
  const hours = parseFloat(document.getElementById('ro-laborhours').value);
  if (!id || isNaN(hours)) return;
  const lt = allLaborTypes.find(l => l.id === id);
  reopenLabor.push({ id, name: lt.labor_type_name, hours });
  renderReopenLabor();
  document.getElementById('ro-laborhours').value = '';
}
function removeReopenLabor(idx) { reopenLabor.splice(idx, 1); renderReopenLabor(); }
function renderReopenLabor() {
  document.querySelector('#ro-labor-table tbody').innerHTML = reopenLabor.map((l,i) =>
    `<tr><td>${l.name}</td><td>${l.hours} hr</td>
     <td><button onclick="removeReopenLabor(${i})" style="border:none;background:none;cursor:pointer;color:#a02020;font-weight:bold;font-size:1rem;padding:0.1rem 0.3rem">X</button></td></tr>`
  ).join('') || '<tr><td colspan="3" style="color:#aaa;font-style:italic;font-size:0.83rem">None</td></tr>';
}
function addReopenCharge() {
  const type = document.getElementById('ro-chargetype').value;
  const desc = document.getElementById('ro-chargedesc').value.trim();
  const amt  = parseFloat(document.getElementById('ro-chargeamt').value);
  if (isNaN(amt) || amt < 0) return;
  reopenCharges.push({ type, description: desc, amount: amt });
  renderReopenCharges();
  document.getElementById('ro-chargedesc').value = '';
  document.getElementById('ro-chargeamt').value  = '';
}
function removeReopenCharge(idx) { reopenCharges.splice(idx, 1); renderReopenCharges(); }
function renderReopenCharges() {
  document.querySelector('#ro-charges-table tbody').innerHTML = reopenCharges.map((c,i) =>
    `<tr><td>${c.type}</td><td>${c.description}</td><td>$${Number(c.amount).toFixed(2)}</td>
     <td><button onclick="removeReopenCharge(${i})" style="border:none;background:none;cursor:pointer;color:#a02020;font-weight:bold;font-size:1rem;padding:0.1rem 0.3rem">X</button></td></tr>`
  ).join('') || '<tr><td colspan="4" style="color:#aaa;font-style:italic;font-size:0.83rem">None</td></tr>';
}

async function saveReopen(jobId, compId) {
  const msg = document.getElementById('ro-msg');
  msg.innerHTML = '';
  await db.from('jobs').update({
    status:                document.getElementById('ro-status').value,
    scope:                 document.getElementById('ro-scope').value      || null,
    site_notes:            document.getElementById('ro-sitenotes').value  || null,
    work_order_number:     document.getElementById('ro-wo').value         || null,
    purchase_order_number: document.getElementById('ro-po').value         || null,
    updated_at: new Date().toISOString()
  }).eq('id', jobId);
  const compPayload = {
    job_id:         jobId,
    time_in:        document.getElementById('ro-timein').value    || null,
    time_out:       document.getElementById('ro-timeout').value   || null,
    payment_type:   document.getElementById('ro-paytype').value   || null,
    payment_detail: document.getElementById('ro-paydetail').value || null,
    tech_notes:     document.getElementById('ro-technotes').value || null,
    follow_up_flag: document.getElementById('ro-followup').checked,
    last_edited_by: currentUser.id,
    last_edited_at: new Date().toISOString()
  };
  if (compId) {
    await db.from('job_completions').update(compPayload).eq('id', compId);
  } else {
    compPayload.submitted_by = currentUser.id;
    await db.from('job_completions').insert(compPayload);
  }
  await db.from('job_line_items').delete().eq('job_id', jobId);
  const lineItems = [
    ...reopenParts.map(p => ({ job_id: jobId, item_type: 'Part',  item_id: p.id, quantity: p.qty,   unit_cost: allParts.find(x => x.id === p.id)?.unit_cost || 0 })),
    ...reopenLabor.map(l => ({ job_id: jobId, item_type: 'Labor', item_id: l.id, quantity: l.hours, unit_cost: allLaborTypes.find(x => x.id === l.id)?.hourly_rate || 0 })),
    ...reopenCharges.map(c => ({ job_id: jobId, item_type: c.type, item_id: '00000000-0000-0000-0000-000000000000', quantity: 1, unit_cost: c.amount, override_reason: c.description }))
  ];
  if (lineItems.length) await db.from('job_line_items').insert(lineItems);
  for (const v of reopenVisits) {
    await db.from('job_visits').update({
      clocked_in_at:  document.getElementById(`vi-cin-${v.id}`)?.value  || null,
      clocked_out_at: document.getElementById(`vi-cout-${v.id}`)?.value || null
    }).eq('id', v.id);
  }
  msg.innerHTML = '<div class="msg success">Job updated.</div>';
  setTimeout(() => { closeReopenModal(); loadSchedule(); }, 1000);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.parts-search-wrap'))
    document.querySelectorAll('.parts-results').forEach(el => el.style.display = 'none');
});

init();
</script>
</body>
</html>
