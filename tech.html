<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faith Lock | Field View</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; }
body { font-family: sans-serif; margin: 0; background: #f0f0f0; font-size: 0.9rem; }
header { background: #1a1a1a; color: white; padding: 0.7rem 1rem; display: flex; justify-content: space-between; align-items: center; }
header h1 { margin: 0; font-size: 1rem; }
button.logout { background: none; border: 1px solid #aaa; color: #aaa; padding: 0.3rem 0.7rem; cursor: pointer; }
.container { max-width: 700px; margin: 1rem auto; padding: 0 1rem; }
.tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
.tab { padding: 0.4rem 1rem; border: 1px solid #ccc; background: white; cursor: pointer; font-size: 0.9rem; }
.tab.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
.filter-btn { padding: 0.4rem 1rem; border: 1px solid #ccc; background: white; cursor: pointer; font-size: 0.85rem; }
.filter-btn.active { background: #444; color: white; border-color: #444; }
.card { background: white; border: 1px solid #ccc; margin-bottom: 0.8rem; padding: 1rem; }
.card h3 { margin: 0 0 0.3rem; font-size: 1rem; }
.card .meta { color: #555; font-size: 0.82rem; margin-bottom: 0.5rem; }
.fixed-banner { background: #ffe0e0; border: 1px solid #f99; color: #900; padding: 0.4rem 0.7rem; margin-bottom: 0.6rem; font-weight: bold; font-size: 0.85rem; }
.expected-banner { background: #e8f0ff; border: 1px solid #99c; color: #224; padding: 0.4rem 0.7rem; margin-bottom: 0.6rem; font-size: 0.85rem; }
.contact-info { background: #e8f4ff; border: 1px solid #9bc; color: #135; padding: 0.4rem 0.7rem; margin-bottom: 0.6rem; font-size: 0.85rem; }
.address-info { background: #f4f4f4; border: 1px solid #ccc; padding: 0.4rem 0.7rem; margin-bottom: 0.6rem; font-size: 0.85rem; }
.btn { padding: 0.5rem 1rem; border: none; cursor: pointer; font-size: 0.9rem; margin-right: 0.4rem; margin-bottom: 0.3rem; border-radius: 2px; }
.btn-primary { background: #1a1a1a; color: white; }
.btn-secondary { background: #ddd; color: #333; }
.btn-warn { background: #b8860b; color: white; }
.btn-green { background: #2a7a2a; color: white; }
.form-section { margin-top: 0.8rem; border-top: 1px solid #eee; padding-top: 0.8rem; }
.form-row { margin-bottom: 0.6rem; }
.form-row label { display: block; font-weight: bold; font-size: 0.82rem; margin-bottom: 0.2rem; }
.form-row input, .form-row select, .form-row textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; font-size: 0.9rem; }
.form-row textarea { height: 70px; resize: vertical; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 0.4rem; }
th { background: #eee; text-align: left; padding: 0.3rem 0.5rem; }
td { padding: 0.3rem 0.5rem; border-bottom: 1px solid #eee; }
.parts-wrap { position: relative; margin-bottom: 0.5rem; }
.parts-wrap input { width: 100%; padding: 0.5rem; border: 1px solid #ccc; font-size: 0.9rem; }
.parts-results { border: 1px solid #ccc; background: white; max-height: 200px; overflow-y: auto; position: absolute; z-index: 50; width: 100%; top: 100%; left: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
.parts-results div { padding: 0.6rem 0.5rem; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9rem; }
.parts-results div:hover, .parts-results div:active { background: #e8f0ff; }
.msg { padding: 0.5rem; margin-bottom: 0.5rem; font-size: 0.85rem; }
.msg.success { background: #e0ffe0; border: 1px solid #9d9; }
.msg.error { background: #ffe0e0; border: 1px solid #f99; }
input[type=checkbox] { width: auto; }
.section-title { font-weight: bold; margin: 0.8rem 0 0.4rem; font-size: 0.88rem; border-bottom: 1px solid #eee; padding-bottom: 0.2rem; }
</style>
</head>
<body>
<header>
  <h1>Faith Lock &amp; Safe | Field View</h1>
  <button class="logout" onclick="logout()">Sign Out</button>
</header>
<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="showTab('jobs')">My Jobs</div>
    <div class="tab" onclick="showTab('newjob')">+ New Job</div>
    <div class="tab" onclick="showTab('newcustomer')">+ New Customer</div>
  </div>

  <div id="tab-jobs">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('today',this)">Today</button>
      <button class="filter-btn" onclick="setFilter('week',this)">This Week</button>
      <button class="filter-btn" onclick="setFilter('open',this)">All Open</button>
    </div>
    <div id="jobs-list">Loading...</div>
  </div>

  <div id="tab-newjob" style="display:none">
    <div class="card">
      <h3>Log Unscheduled Job</h3>
      <div class="form-row"><label>Account</label>
        <select id="nj-account" onchange="loadSubAccounts('nj')"><option value="">Select account...</option></select>
      </div>
      <div class="form-row"><label>Sub-Account</label>
        <select id="nj-subaccount"><option value="">None</option></select>
      </div>
      <div class="form-row"><label>Job Type</label>
        <select id="nj-jobtype"><option value="">Select type...</option></select>
      </div>
      <div class="form-row"><label>Date</label><input type="date" id="nj-date"></div>
      <div class="form-row"><label>Scope</label><textarea id="nj-scope"></textarea></div>
      <div class="form-section">
        <div class="section-title">Completion Details</div>
        <div class="form-row"><label>Time In</label><input type="datetime-local" id="nj-timein"></div>
        <div class="form-row"><label>Time Out</label><input type="datetime-local" id="nj-timeout"></div>
        <div class="form-row"><label>Payment Type</label>
          <select id="nj-paytype">
            <option value="">Select...</option>
            <option>Cash</option><option>Check</option><option>Card</option><option>Invoice</option>
          </select>
        </div>
        <div class="form-row"><label>Payment Detail</label><input type="text" id="nj-paydetail"></div>
        <div class="form-row">
          <label>Parts Used</label>
          <div class="parts-wrap">
            <input type="text" id="nj-partsearch" placeholder="Type to search parts..." oninput="searchParts('nj')" autocomplete="off">
            <div class="parts-results" id="nj-parts-results" style="display:none"></div>
          </div>
          <table id="nj-parts-table"><thead><tr><th>Part</th><th>Qty</th><th></th></tr></thead><tbody></tbody></table>
        </div>
        <div class="form-row"><label>Labor</label>
          <div style="display:flex;gap:0.4rem;margin-bottom:0.4rem;flex-wrap:wrap">
            <select id="nj-labortype" style="flex:2;padding:0.5rem;border:1px solid #ccc"><option value="">Select type...</option></select>
            <input type="number" id="nj-laborhours" placeholder="Hrs" style="width:70px;padding:0.5rem;border:1px solid #ccc">
            <button class="btn btn-secondary" onclick="addLabor('nj')">Add</button>
          </div>
          <table id="nj-labor-table"><thead><tr><th>Type</th><th>Hours</th><th></th></tr></thead><tbody></tbody></table>
        </div>
        <div class="form-row"><label>Tech Notes</label><textarea id="nj-notes"></textarea></div>
        <div class="form-row"><label><input type="checkbox" id="nj-followup"> Flag for Follow-up</label></div>
        <div class="form-row"><label>Photos</label><input type="file" id="nj-photos" accept="image/*" multiple></div>
      </div>
      <div id="nj-msg"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:0.5rem" onclick="submitNewJob()">Submit Job</button>
    </div>
  </div>

  <div id="tab-newcustomer" style="display:none">
    <div class="card">
      <h3>Submit New Customer</h3>
      <p style="font-size:0.82rem;color:#555">Admin will add this to the permanent account list.</p>
      <div class="form-row"><label>Customer Name</label><input type="text" id="nc-name"></div>
      <div class="form-row"><label>Address</label><input type="text" id="nc-address"></div>
      <div class="form-row"><label>Phone</label><input type="text" id="nc-phone"></div>
      <div class="form-row"><label>Notes</label><textarea id="nc-notes"></textarea></div>
      <div id="nc-msg"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:0.5rem" onclick="submitNewCustomer()">Submit</button>
    </div>
  </div>
</div>

<!-- Job Detail Modal -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;overflow-y:auto">
  <div style="background:white;max-width:640px;margin:0 auto;padding:1.5rem;position:relative;min-height:100vh">
    <button onclick="closeModal()" style="position:absolute;top:0.5rem;right:0.5rem;background:#ddd;border:none;font-size:1rem;cursor:pointer;padding:0.3rem 0.6rem">Close</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jmsrlhqbzstuczxilxua.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imptc3JsaHFienN0dWN6eGlseHVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MzA5NDcsImV4cCI6MjA5MjQwNjk0N30.jpHtuhezvfRXJ2uVhwglqS_rImZl8JqqBX85WUv2Z5g';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let allParts = [], allLaborTypes = [], allAccounts = [], allJobTypes = [];
let currentFilter = 'today';
let modalJobId = null;
let modalParts = [], modalLabor = [];
let njParts = [], njLabor = [];

// ---- DATE FORMAT ----
function formatDate(str) {
  if (!str) return '';
  const [y, m, d] = str.split('-');
  return `${m}/${d}/${y}`;
}

async function init() {
  try {
    const { data: { session }, error: sessErr } = await db.auth.getSession();
    if (sessErr) throw sessErr;
    if (!session) { window.location.href = 'index.html'; return; }
    currentUser = session.user;
    await Promise.all([loadRefData(), loadJobs()]);
  } catch (err) {
    document.getElementById('jobs-list').innerHTML =
      `<div class="msg error"><strong>Load error:</strong> ${err.message || JSON.stringify(err)}<br>
       <span style="font-size:0.82rem">Try signing out and back in.</span></div>`;
    console.error('tech init error:', err);
  }
}

async function loadRefData() {
  const [p, l, a, jt] = await Promise.all([
    db.from('parts').select('id,part_name,category,unit').eq('active', true).order('part_name'),
    db.from('labor_types').select('id,labor_type_name,hourly_rate').order('labor_type_name'),
    db.from('accounts').select('id,account_name,parent_account_id').eq('active', true).order('account_name'),
    db.from('job_types').select('id,job_type_name,category').eq('active', true).order('job_type_name')
  ]);
  allParts = p.data || [];
  allLaborTypes = l.data || [];
  allAccounts = a.data || [];
  allJobTypes = jt.data || [];
  populateSelect('nj-account', allAccounts.filter(a => !a.parent_account_id), 'id', 'account_name', 'Select account...');
  populateSelect('nj-jobtype', allJobTypes, 'id', 'job_type_name', 'Select type...');
  populateSelect('nj-labortype', allLaborTypes, 'id', 'labor_type_name', 'Select type...');
  document.getElementById('nj-date').value = today();
}

function populateSelect(id, items, vk, lk, ph) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<option value="">${ph}</option>` + items.map(i => `<option value="${i[vk]}">${i[lk]}</option>`).join('');
}

function today() { return new Date().toISOString().split('T')[0]; }
function weekStart() {
  const d = new Date();
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  return d.toISOString().split('T')[0];
}

// Primary contacts cache for job cards (account_id -> contact)
let allPrimaryContactsCache = {};

async function loadJobs() {
  const list = document.getElementById('jobs-list');
  list.innerHTML = '<p style="color:#888">Loading...</p>';
  try {
    let query = db.from('jobs')
      .select(`id, job_date, status, scope, site_notes, is_fixed_price, quote_amount,
               work_order_number, purchase_order_number,
               assigned_tech_ids, lead_tech_id,
               accounts!jobs_account_id_fkey(account_name, address),
               sub:accounts!jobs_sub_account_id_fkey(account_name),
               job_types(job_type_name),
               job_completions(id,tech_notes,follow_up_flag,submitted_at),
               job_line_items(id,item_type,item_id,quantity)`)
      .not('status', 'in', '("Cancelled","Approved")');
    if (currentFilter === 'today') query = query.eq('job_date', today());
    else if (currentFilter === 'week') query = query.gte('job_date', weekStart());
    const { data, error } = await query.order('job_date', { ascending: true });
    if (error) throw error;
    const myJobs = data || [];
    if (!myJobs.length) { list.innerHTML = '<p>No jobs found for this period.</p>'; return; }

    // Fetch primary contacts for all unique account IDs in the job list
    const accountIds = [...new Set(myJobs.map(j => j.account_id).filter(Boolean))];
    allPrimaryContactsCache = {};
    if (accountIds.length) {
      const { data: contacts } = await db.from('account_contacts')
        .select('account_id,contact_name,work_phone,cell_phone,is_primary')
        .in('account_id', accountIds).eq('active', true).eq('is_primary', true);
      (contacts || []).forEach(c => { allPrimaryContactsCache[c.account_id] = c; });
    }

    list.innerHTML = myJobs.map(j => jobCard(j)).join('');
  } catch (err) {
    list.innerHTML = `<div class="msg error"><strong>Error loading jobs:</strong> ${err.message}</div>`;
    console.error('loadJobs error:', err);
  }
}

function jobCard(j) {
  const account = j.accounts?.account_name || 'Unknown Account';
  const sub = j.sub?.account_name ? ` / ${j.sub.account_name}` : '';
  const comp = j.job_completions?.[0];
  const submitted = !!comp;

  const fixedBanner = j.is_fixed_price
    ? `<div class="fixed-banner">FIXED PRICE | Quoted: $${Number(j.quote_amount||0).toFixed(2)} | Do not exceed scope without calling Rich.</div>` : '';

  // Primary contact from cache (loaded in loadJobs)
  const pc = allPrimaryContactsCache[j.account_id];
  let contactHtml = '';
  if (pc) {
    let line = `<strong>Contact:</strong> ${pc.contact_name}`;
    if (pc.work_phone) line += ` | Work: ${pc.work_phone}`;
    if (pc.cell_phone) line += ` | Cell: ${pc.cell_phone}`;
    contactHtml = `<div class="contact-info">${line}</div>`;
  }

  const expParts = (j.job_line_items||[]).filter(i => i.item_type === 'Part');
  const expLabor = (j.job_line_items||[]).filter(i => i.item_type === 'Labor');
  let expHtml = '';
  if (!submitted && (expParts.length || expLabor.length)) {
    const pNames = expParts.map(i => {
      const p = allParts.find(x => x.id === i.item_id);
      return p ? `${p.part_name} x${i.quantity}` : '';
    }).filter(Boolean).join(', ');
    const lNames = expLabor.map(i => {
      const l = allLaborTypes.find(x => x.id === i.item_id);
      return l ? `${l.labor_type_name} ${i.quantity}hr` : '';
    }).filter(Boolean).join(', ');
    expHtml = `<div class="expected-banner">${pNames?`<div><strong>Expected parts:</strong> ${pNames}</div>`:''}${lNames?`<div><strong>Expected labor:</strong> ${lNames}</div>`:''}</div>`;
  }

  // Address block
  const addr = j.accounts?.address;
  const addrHtml = addr ? `<div class="address-info"><strong>Address:</strong> ${addr}</div>` : '';

  // WO/PO
  const wopo = [
    j.work_order_number ? `WO: ${j.work_order_number}` : '',
    j.purchase_order_number ? `PO: ${j.purchase_order_number}` : ''
  ].filter(Boolean).join(' | ');

  return `<div class="card">
    <h3>${account}${sub}</h3>
    <div class="meta">${formatDate(j.job_date)} | ${j.job_types?.job_type_name||''} | ${j.status}</div>
    ${wopo ? `<div class="meta">${wopo}</div>` : ''}
    ${addrHtml}
    ${contactHtml}
    ${fixedBanner}${expHtml}
    ${j.scope ? `<div style="font-size:0.85rem;margin-bottom:0.4rem"><strong>Scope:</strong> ${j.scope}</div>` : ''}
    ${j.site_notes ? `<div style="font-size:0.85rem;margin-bottom:0.4rem"><strong>Site Notes:</strong> ${j.site_notes}</div>` : ''}
    ${submitted ? '<div class="msg success" style="margin-bottom:0.4rem">Submitted</div>' : ''}
    <div style="margin-top:0.4rem">
      <button class="btn btn-primary" onclick="openJobDetail('${j.id}')" style="width:100%">Job Details</button>
      ${submitted && j.status==='Pending Review' ? `<button class="btn btn-warn" onclick="unsubmit('${j.id}','${comp.id}')" style="width:100%;margin-top:0.4rem">Unsubmit</button>` : ''}
    </div>
  </div>`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadJobs();
}

async function unsubmit(jobId, compId) {
  if (!confirm('Remove your submission? The job will return to Scheduled. Only do this if Rich has not yet reviewed it.')) return;
  await db.from('job_completions').delete().eq('id', compId);
  await db.from('job_line_items').delete().eq('job_id', jobId);
  await db.from('jobs').update({ status: 'Scheduled', updated_at: new Date().toISOString() }).eq('id', jobId);
  loadJobs();
}

function showTab(name) {
  ['jobs','newjob','newcustomer'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', ['jobs','newjob','newcustomer'][i] === name));
}

// ---- JOB DETAIL MODAL ----
// Opens for both completed and uncompleted jobs.
// Shows all job info + contact + completion form if not yet submitted.
async function openJobDetail(jobId) {
  modalJobId = jobId;
  modalParts = [];
  modalLabor = [];

  const { data: job } = await db.from('jobs')
    .select(`*, accounts!jobs_account_id_fkey(account_name, address),
             sub:accounts!jobs_sub_account_id_fkey(account_name),
             job_types(job_type_name),
             job_completions(id,time_in,time_out,payment_type,payment_detail,follow_up_flag,tech_notes,submitted_at),
             job_line_items(id,item_type,item_id,quantity)`)
    .eq('id', jobId).single();

  // Fetch primary contact for this account
  let contactHtml = '';
  if (job.account_id) {
    const { data: contacts } = await db.from('account_contacts')
      .select('*').eq('account_id', job.account_id).eq('active', true)
      .order('is_primary', { ascending: false });
    if (contacts?.length) {
      const primary = contacts.find(c => c.is_primary) || contacts[0];
      const secondary = contacts.find(c => c.is_secondary && !c.is_primary);
      let ch = `<div class="contact-info"><strong>Contact:</strong> ${primary.contact_name}`;
      if (primary.title) ch += ` | ${primary.title}`;
      if (primary.company) ch += ` | ${primary.company}`;
      ch += '<br>';
      if (primary.work_phone) ch += `Work: ${primary.work_phone} &nbsp;`;
      if (primary.cell_phone) ch += `Cell: ${primary.cell_phone} &nbsp;`;
      if (primary.email) ch += primary.email;
      if (primary.notes) ch += `<br><em style="font-size:0.82rem">${primary.notes}</em>`;
      if (secondary) {
        ch += `<br><span style="font-size:0.82rem">Secondary: ${secondary.contact_name}`;
        if (secondary.work_phone) ch += ` | ${secondary.work_phone}`;
        if (secondary.cell_phone) ch += ` / ${secondary.cell_phone}`;
        ch += '</span>';
      }
      ch += '</div>';
      contactHtml = ch;
    }
  }

  const comp = job.job_completions?.[0];
  const submitted = !!comp;

  // Pre-load expected line items so tech can confirm/adjust
  (job.job_line_items || []).forEach(i => {
    if (i.item_type === 'Part') {
      const p = allParts.find(x => x.id === i.item_id);
      if (p) modalParts.push({ id: p.id, name: p.part_name, unit: p.unit||'', qty: i.quantity });
    } else if (i.item_type === 'Labor') {
      const l = allLaborTypes.find(x => x.id === i.item_id);
      if (l) modalLabor.push({ id: l.id, name: l.labor_type_name, hours: i.quantity });
    }
  });

  const laborOpts = allLaborTypes.map(l => `<option value="${l.id}">${l.labor_type_name}</option>`).join('');
  const fixedBanner = job.is_fixed_price
    ? `<div class="fixed-banner">FIXED PRICE | Quoted: $${Number(job.quote_amount||0).toFixed(2)} | Do not exceed scope without calling Rich.</div>` : '';

  const wopo = [
    job.work_order_number ? `WO: ${job.work_order_number}` : '',
    job.purchase_order_number ? `PO: ${job.purchase_order_number}` : ''
  ].filter(Boolean).join(' | ');

  const addrHtml = job.accounts?.address
    ? `<div class="address-info"><strong>Address:</strong> ${job.accounts.address}</div>` : '';

  const preNote = (job.job_line_items||[]).filter(i => i.item_type === 'Part' || i.item_type === 'Labor').length
    ? `<p style="font-size:0.82rem;color:#446;margin:0 0 0.5rem">Expected parts and labor are pre-loaded. Adjust quantities or add/remove as needed.</p>` : '';

  let completionSection = '';
  if (submitted) {
    // Show submitted data read-only with option to add a note
    completionSection = `
      <div class="form-section">
        <div class="section-title">Submitted Details</div>
        <div class="meta">Time In: ${comp.time_in ? new Date(comp.time_in).toLocaleString() : '--'}</div>
        <div class="meta">Time Out: ${comp.time_out ? new Date(comp.time_out).toLocaleString() : '--'}</div>
        <div class="meta">Payment: ${comp.payment_type || '--'} ${comp.payment_detail || ''}</div>
        ${comp.tech_notes ? `<div class="meta">Notes: ${comp.tech_notes}</div>` : ''}
        <div style="margin-top:0.8rem">
          <button class="btn btn-secondary" style="width:100%" onclick="openAddNote('${jobId}')">Add Note</button>
        </div>
      </div>
      <div class="form-section">
        <div class="section-title">Photos</div>
        <div id="tech-job-photos-${jobId}" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.5rem">
          <span style="font-size:0.82rem;color:#aaa">Loading photos...</span>
        </div>
        <div class="form-row"><label>Add Photos</label><input type="file" id="extra-photos-${jobId}" accept="image/*" multiple></div>
        <button class="btn btn-secondary" style="width:100%" onclick="uploadExtraPhotos('${jobId}')">Upload More Photos</button>
        <div id="extra-photo-msg-${jobId}" style="font-size:0.82rem;color:#2a7a2a;margin-top:0.3rem"></div>
      </div>`;
  } else {
    completionSection = `
      <div class="form-section">
        <div class="section-title">Complete This Job</div>
        <div class="form-row"><label>Time In</label><input type="datetime-local" id="m-timein"></div>
        <div class="form-row"><label>Time Out</label><input type="datetime-local" id="m-timeout"></div>
      </div>
      <div class="form-section">
        <div class="section-title">Parts Used</div>
        ${preNote}
        <div class="parts-wrap">
          <input type="text" id="m-partsearch" placeholder="Type to search parts..." oninput="searchParts('m')" autocomplete="off">
          <div class="parts-results" id="m-parts-results" style="display:none"></div>
        </div>
        <table id="m-parts-table"><thead><tr><th>Part</th><th>Qty</th><th></th></tr></thead><tbody></tbody></table>
      </div>
      <div class="form-section">
        <div class="section-title">Labor</div>
        <div style="display:flex;gap:0.4rem;margin-bottom:0.4rem;flex-wrap:wrap">
          <select id="m-labortype" style="flex:2;padding:0.5rem;border:1px solid #ccc;min-width:150px"><option value="">Select type...</option>${laborOpts}</select>
          <input type="number" id="m-laborhours" placeholder="Hrs" style="width:70px;padding:0.5rem;border:1px solid #ccc">
          <button class="btn btn-secondary" onclick="addLabor('m')">Add</button>
        </div>
        <table id="m-labor-table"><thead><tr><th>Type</th><th>Hours</th><th></th></tr></thead><tbody></tbody></table>
      </div>
      <div class="form-section">
        <div class="form-row"><label>Payment Type</label>
          <select id="m-paytype"><option value="">Select...</option><option>Cash</option><option>Check</option><option>Card</option><option>Invoice</option></select>
        </div>
        <div class="form-row"><label>Payment Detail (check number, last 4, etc.)</label><input type="text" id="m-paydetail"></div>
      </div>
      <div class="form-section">
        <div class="form-row"><label>Tech Notes</label><textarea id="m-notes"></textarea></div>
        <div class="form-row"><label><input type="checkbox" id="m-followup"> Flag for Follow-up</label></div>
        <div class="form-row"><label>Photos</label><input type="file" id="m-photos" accept="image/*" multiple></div>
      </div>
      <div class="form-section">
        <div class="section-title">Quote Form (leave blank if not a quote job)</div>
        <div class="form-row"><label>Scope Observed</label><textarea id="m-quote-scope"></textarea></div>
        <div class="form-row"><label>Materials / Notes for Rich</label><textarea id="m-quote-materials"></textarea></div>
      </div>
      <div id="m-msg" style="margin-top:0.5rem"></div>
      <button class="btn btn-green" style="width:100%;margin-top:0.8rem;padding:0.8rem;font-size:1rem" onclick="submitCompletion()">Submit Completion</button>`;
  }

  document.getElementById('modal-content').innerHTML = `
    <h3 style="margin-top:0.5rem">${job.accounts?.account_name||''}${job.sub?.account_name ? ' / '+job.sub.account_name : ''}</h3>
    <div class="meta">${formatDate(job.job_date)} | ${job.job_types?.job_type_name||''}</div>
    ${wopo ? `<div class="meta">${wopo}</div>` : ''}
    ${addrHtml}
    ${contactHtml}
    ${fixedBanner}
    ${job.scope ? `<p style="font-size:0.85rem;margin:0.3rem 0"><strong>Scope:</strong> ${job.scope}</p>` : ''}
    ${job.site_notes ? `<p style="font-size:0.85rem;margin:0.3rem 0"><strong>Site Notes:</strong> ${job.site_notes}</p>` : ''}
    ${submitted ? '<div class="msg success">Job submitted. Awaiting admin review.</div>' : ''}
    ${completionSection}
  `;

  if (!submitted) {
    renderPartsTable('m');
    renderLaborTable('m');
  } else {
    loadTechJobPhotos(jobId);
  }
  document.getElementById('modal').style.display = '';
  window.scrollTo(0, 0);
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

// ---- JOB PHOTOS (tech view) ----
async function loadTechJobPhotos(jobId) {
  const grid = document.getElementById(`tech-job-photos-${jobId}`);
  if (!grid) return;
  grid.innerHTML = '<span style="font-size:0.82rem;color:#aaa">Loading...</span>';

  const { data: photos } = await db.from('job_photos')
    .select('id,storage_path,file_name,uploaded_at')
    .eq('job_id', jobId)
    .order('uploaded_at', { ascending: false });

  if (!photos?.length) {
    grid.innerHTML = '<span style="font-size:0.82rem;color:#aaa">No photos yet.</span>';
    return;
  }

  const withUrls = await Promise.all(photos.map(async p => {
    const { data: signed } = await db.storage.from('job-photos').createSignedUrl(p.storage_path, 7200);
    if (signed?.signedUrl) return { ...p, url: signed.signedUrl };
    const { data: pub } = db.storage.from('job-photos').getPublicUrl(p.storage_path);
    return { ...p, url: pub?.publicUrl || null };
  }));

  grid.innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:0.5rem">' + withUrls.map(p =>
    `<div style="text-align:center">
      ${p.url
        ? `<a href="${p.url}" target="_blank"><img src="${p.url}"
            style="width:100px;height:80px;object-fit:cover;border:1px solid #ccc;display:block"
            onerror="this.parentElement.innerHTML='<div style=&quot;width:100px;height:80px;background:#eee;border:1px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:0.75rem;padding:4px&quot;>${p.file_name||&quot;photo&quot;}</div>'"></a>`
        : `<div style="width:100px;height:80px;background:#eee;border:1px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:0.75rem;padding:4px">${p.file_name||'photo'}</div>`
      }
      <div style="font-size:0.72rem;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px">
        ${p.url ? `<a href="${p.url}" target="_blank" style="color:#1a4a8a">${p.file_name||'photo'}</a>` : (p.file_name||'photo')}
      </div>
    </div>`
  ).join('') + '</div>';
}

async function uploadExtraPhotos(jobId) {
  const input = document.getElementById(`extra-photos-${jobId}`);
  const msgEl = document.getElementById(`extra-photo-msg-${jobId}`);
  if (!input?.files?.length) { msgEl.textContent = 'No files selected.'; return; }
  msgEl.textContent = 'Uploading...';
  await uploadPhotos(input.files, jobId);
  input.value = '';
  msgEl.textContent = 'Uploaded.';
  await loadTechJobPhotos(jobId);
}

// ---- PARTS SEARCH ----
function searchParts(prefix) {
  const input = document.getElementById(`${prefix}-partsearch`);
  const results = document.getElementById(`${prefix}-parts-results`);
  if (!input || !results) return;
  const q = input.value.toLowerCase().trim();
  if (!q) { results.style.display = 'none'; return; }
  const matches = allParts.filter(p => p.part_name.toLowerCase().includes(q)).slice(0, 12);
  if (!matches.length) { results.style.display = 'none'; return; }
  results.innerHTML = matches.map(p =>
    `<div data-id="${p.id}" data-name="${p.part_name.replace(/"/g,'&quot;')}" data-unit="${(p.unit||'').replace(/"/g,'&quot;')}">
      ${p.part_name}${p.unit ? ` (${p.unit})` : ''}${p.category ? ` | ${p.category}` : ''}
    </div>`).join('');
  results.style.display = 'block';
  results.querySelectorAll('div').forEach(div => {
    div.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      addPart(prefix, div.dataset.id, div.dataset.name, div.dataset.unit);
    });
  });
}

document.addEventListener('click', e => {
  if (!e.target.closest('.parts-wrap'))
    document.querySelectorAll('.parts-results').forEach(el => el.style.display = 'none');
});

function addPart(prefix, id, name, unit) {
  const store = prefix === 'm' ? modalParts : njParts;
  const ex = store.find(p => p.id === id);
  if (ex) ex.qty += 1; else store.push({ id, name, unit, qty: 1 });
  renderPartsTable(prefix);
  document.getElementById(`${prefix}-parts-results`).style.display = 'none';
  document.getElementById(`${prefix}-partsearch`).value = '';
}

function removePart(prefix, idx) { (prefix==='m'?modalParts:njParts).splice(idx, 1); renderPartsTable(prefix); }
function renderPartsTable(prefix) {
  const store = prefix==='m' ? modalParts : njParts;
  const tbody = document.querySelector(`#${prefix}-parts-table tbody`);
  if (!tbody) return;
  tbody.innerHTML = store.map((p, i) =>
    `<tr><td>${p.name}</td>
     <td><input type="number" min="0.1" step="0.1" value="${p.qty}" style="width:60px;padding:0.3rem;border:1px solid #ccc;font-size:0.9rem" onchange="${prefix==='m'?'modalParts':'njParts'}[${i}].qty=parseFloat(this.value)||1"></td>
     <td><button onclick="removePart('${prefix}',${i})" style="border:none;background:none;cursor:pointer;color:red;font-size:1.1rem;padding:0.2rem 0.5rem">X</button></td></tr>`
  ).join('') || '<tr><td colspan="3" style="color:#aaa;font-style:italic">None added</td></tr>';
}

function addLabor(prefix) {
  const typeId = document.getElementById(`${prefix}-labortype`).value;
  const hours = parseFloat(document.getElementById(`${prefix}-laborhours`).value);
  if (!typeId || isNaN(hours) || hours <= 0) return;
  const lt = allLaborTypes.find(l => l.id === typeId);
  const store = prefix==='m' ? modalLabor : njLabor;
  const ex = store.find(l => l.id === typeId);
  if (ex) ex.hours = hours; else store.push({ id: typeId, name: lt.labor_type_name, hours });
  renderLaborTable(prefix);
  document.getElementById(`${prefix}-laborhours`).value = '';
}

function removeLabor(prefix, idx) { (prefix==='m'?modalLabor:njLabor).splice(idx, 1); renderLaborTable(prefix); }
function renderLaborTable(prefix) {
  const store = prefix==='m' ? modalLabor : njLabor;
  const tbody = document.querySelector(`#${prefix}-labor-table tbody`);
  if (!tbody) return;
  tbody.innerHTML = store.map((l, i) =>
    `<tr><td>${l.name}</td><td>${l.hours} hr</td>
     <td><button onclick="removeLabor('${prefix}',${i})" style="border:none;background:none;cursor:pointer;color:red;font-size:1rem">X</button></td></tr>`
  ).join('') || '<tr><td colspan="3" style="color:#aaa;font-style:italic">None added</td></tr>';
}

// ---- SUBMIT COMPLETION ----
async function submitCompletion() {
  const msg = document.getElementById('m-msg');
  msg.innerHTML = '';
  await db.from('job_line_items').delete().eq('job_id', modalJobId);
  const { error: ce } = await db.from('job_completions').insert({
    job_id: modalJobId,
    time_in: document.getElementById('m-timein').value || null,
    time_out: document.getElementById('m-timeout').value || null,
    payment_type: document.getElementById('m-paytype').value || null,
    payment_detail: document.getElementById('m-paydetail').value || null,
    follow_up_flag: document.getElementById('m-followup').checked,
    tech_notes: document.getElementById('m-notes').value || null,
    submitted_by: currentUser.id
  });
  if (ce) { msg.innerHTML = `<div class="msg error">${ce.message}</div>`; return; }

  const lineItems = [
    ...modalParts.map(p => ({ job_id: modalJobId, item_type: 'Part', item_id: p.id, quantity: p.qty, unit_cost: 0 })),
    ...modalLabor.map(l => ({ job_id: modalJobId, item_type: 'Labor', item_id: l.id, quantity: l.hours, unit_cost: 0 }))
  ];
  if (lineItems.length) await db.from('job_line_items').insert(lineItems);
  await db.from('jobs').update({ status: 'Pending Review', updated_at: new Date().toISOString() }).eq('id', modalJobId);
  await uploadPhotos(document.getElementById('m-photos').files, modalJobId);

  const qScope = document.getElementById('m-quote-scope').value;
  const qMat = document.getElementById('m-quote-materials').value;
  if (qScope || qMat) {
    await db.from('quote_forms').insert({
      job_id: modalJobId, scope_observed: qScope||null,
      materials_json: qMat ? [{ notes: qMat }] : null,
      locked_at: new Date().toISOString(), created_by: currentUser.id
    });
  }
  msg.innerHTML = '<div class="msg success">Job submitted successfully.</div>';
  setTimeout(() => { closeModal(); loadJobs(); }, 1200);
}

// ---- PHOTO UPLOAD ----
async function uploadPhotos(files, jobId) {
  if (!files || !files.length) return;
  const { data: job } = await db.from('jobs').select('account_id').eq('id', jobId).single();
  for (const file of files) {
    const path = `${jobId}/${Date.now()}_${file.name}`;
    const resized = await resizeImage(file, 1200);
    const { error } = await db.storage.from('job-photos').upload(path, resized);
    if (error) continue;
    await db.from('job_photos').insert({
      job_id: jobId, account_id: job?.account_id || null,
      storage_path: path, file_name: file.name, uploaded_by: currentUser.id
    });
  }
}

function resizeImage(file, maxW) {
  return new Promise(resolve => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale; canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.85);
      URL.revokeObjectURL(url);
    };
    img.src = url;
  });
}

async function openAddNote(jobId) {
  const note = prompt('Add a note to this job:');
  if (!note) return;
  const { data: ex } = await db.from('job_completions').select('id,tech_notes').eq('job_id', jobId).single();
  if (!ex) return;
  const appended = (ex.tech_notes || '') + `\n[${new Date().toLocaleString()}] ${note}`;
  await db.from('job_completions').update({
    tech_notes: appended, last_edited_by: currentUser.id, last_edited_at: new Date().toISOString()
  }).eq('id', ex.id);
  alert('Note added.');
  closeModal();
  loadJobs();
}

function loadSubAccounts(prefix) {
  const parentId = document.getElementById(`${prefix}-account`).value;
  const subs = allAccounts.filter(a => a.parent_account_id === parentId);
  populateSelect(`${prefix}-subaccount`, subs, 'id', 'account_name', 'None');
}

async function submitNewJob() {
  const accountId = document.getElementById('nj-account').value;
  const date = document.getElementById('nj-date').value;
  const msg = document.getElementById('nj-msg');
  msg.innerHTML = '';
  if (!accountId || !date) { msg.innerHTML = '<div class="msg error">Account and date are required.</div>'; return; }
  const { data: job, error } = await db.from('jobs').insert({
    job_date: date, account_id: accountId,
    sub_account_id: document.getElementById('nj-subaccount').value || null,
    job_type_id: document.getElementById('nj-jobtype').value || null,
    assigned_tech_ids: [currentUser.id], status: 'Pending Review',
    scope: document.getElementById('nj-scope').value || null, created_by: currentUser.id
  }).select().single();
  if (error) { msg.innerHTML = `<div class="msg error">${error.message}</div>`; return; }
  await db.from('job_completions').insert({
    job_id: job.id,
    time_in: document.getElementById('nj-timein').value || null,
    time_out: document.getElementById('nj-timeout').value || null,
    payment_type: document.getElementById('nj-paytype').value || null,
    payment_detail: document.getElementById('nj-paydetail').value || null,
    follow_up_flag: document.getElementById('nj-followup').checked,
    tech_notes: document.getElementById('nj-notes').value || null,
    submitted_by: currentUser.id
  });
  const lineItems = [
    ...njParts.map(p => ({ job_id: job.id, item_type: 'Part', item_id: p.id, quantity: p.qty, unit_cost: 0 })),
    ...njLabor.map(l => ({ job_id: job.id, item_type: 'Labor', item_id: l.id, quantity: l.hours, unit_cost: 0 }))
  ];
  if (lineItems.length) await db.from('job_line_items').insert(lineItems);
  await uploadPhotos(document.getElementById('nj-photos').files, job.id);
  msg.innerHTML = '<div class="msg success">Job submitted.</div>';
  njParts = []; njLabor = [];
  renderPartsTable('nj'); renderLaborTable('nj');
  setTimeout(() => { showTab('jobs'); loadJobs(); }, 1200);
}

async function submitNewCustomer() {
  const name = document.getElementById('nc-name').value.trim();
  const msg = document.getElementById('nc-msg');
  msg.innerHTML = '';
  if (!name) { msg.innerHTML = '<div class="msg error">Name is required.</div>'; return; }
  const { error } = await db.from('new_customers').insert({
    name,
    address: document.getElementById('nc-address').value || null,
    phone: document.getElementById('nc-phone').value || null,
    notes: document.getElementById('nc-notes').value || null,
    submitted_by: currentUser.id
  });
  if (error) { msg.innerHTML = `<div class="msg error">${error.message}</div>`; return; }
  msg.innerHTML = '<div class="msg success">Submitted. Admin will add to the account list.</div>';
  ['nc-name','nc-address','nc-phone','nc-notes'].forEach(id => document.getElementById(id).value = '');
}

async function logout() { await db.auth.signOut(); window.location.href = 'index.html'; }
