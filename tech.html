<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faith Lock | Field View</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<style>
/* ---- RESET & BASE ---- */
* { box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: #f2f4f8; font-size: 0.92rem; color: #1a1a2e; }

/* ---- HEADER ---- */
header { background: #1a2744; color: white; padding: 0.7rem 1.2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.25); }
header h1 { margin: 0; font-size: 0.95rem; font-weight: 600; letter-spacing: 0.02em; }
button.logout { background: transparent; border: 1px solid rgba(255,100,100,0.6); color: rgba(255,150,150,0.9); padding: 0.3rem 0.75rem; cursor: pointer; font-size: 0.82rem; border-radius: 3px; }

/* ---- LAYOUT ---- */
.container { max-width: 680px; margin: 1rem auto; padding: 0 1rem; }

/* ---- TABS ---- */
.tabs { display: flex; gap: 0; margin-bottom: 1rem; border-radius: 5px; overflow: hidden; border: 1px solid #c8cdd8; }
.tab { flex: 1; padding: 0.55rem 0.5rem; border: none; background: white; cursor: pointer; font-size: 0.88rem; font-family: inherit; color: #5a6075; font-weight: 500; transition: background 0.15s; text-align: center; }
.tab + .tab { border-left: 1px solid #c8cdd8; }
.tab.active { background: #1a2744; color: white; font-weight: 600; }

/* ---- FILTER BUTTONS ---- */
.filters { display: flex; gap: 0.4rem; margin-bottom: 1rem; flex-wrap: wrap; }
.filter-btn { padding: 0.4rem 1rem; border: 1px solid #c8cdd8; background: white; cursor: pointer; font-size: 0.85rem; font-family: inherit; border-radius: 20px; color: #5a6075; transition: all 0.15s; }
.filter-btn.active { background: #1a2744; color: white; border-color: #1a2744; }

/* ---- CARDS ---- */
.card { background: white; border: 1px solid #dde1ea; border-radius: 6px; margin-bottom: 0.9rem; padding: 1.1rem; box-shadow: 0 1px 4px rgba(26,39,68,0.07); }
.card h3 { margin: 0 0 0.25rem; font-size: 1rem; color: #1a2744; font-weight: 600; }
.card .meta { color: #5a6075; font-size: 0.83rem; margin-bottom: 0.3rem; }

/* ---- BANNERS ---- */
.fixed-banner    { background: #ffe8e8; border: 1px solid #f4aaaa; color: #800; padding: 0.45rem 0.7rem; margin-bottom: 0.6rem; font-weight: 600; font-size: 0.85rem; border-radius: 4px; }
.expected-banner { background: #eaf2ff; border: 1px solid #aacaf8; color: #1a3070; padding: 0.45rem 0.7rem; margin-bottom: 0.6rem; font-size: 0.85rem; border-radius: 4px; }
.contact-info    { background: #e8f0ff; border: 1px solid #b0c4f8; color: #1a3070; padding: 0.45rem 0.7rem; margin-bottom: 0.6rem; font-size: 0.85rem; border-radius: 4px; line-height: 1.55; }
.address-info    { background: #f4f6fb; border: 1px solid #dde1ea; padding: 0.4rem 0.7rem; margin-bottom: 0.6rem; font-size: 0.85rem; border-radius: 4px; }

/* ---- BUTTONS ---- */
.btn { padding: 0.48rem 1rem; border: none; cursor: pointer; font-size: 0.9rem; font-family: inherit; font-weight: 500; border-radius: 4px; margin-right: 0.4rem; margin-bottom: 0.3rem; transition: opacity 0.15s; }
.btn:active { opacity: 0.8; }
.btn-primary   { background: #1a2744; color: white; }
.btn-secondary { background: #eaecf4; color: #333; }
.btn-green     { background: #2a7a4a; color: white; }
.btn-warn      { background: #b86c00; color: white; }

/* ---- FORM ELEMENTS ---- */
.form-section { margin-top: 1rem; border-top: 1px solid #eef0f6; padding-top: 0.9rem; }
.form-row { margin-bottom: 0.65rem; }
.form-row label { display: block; font-weight: 600; font-size: 0.82rem; color: #4a5070; margin-bottom: 0.25rem; }
.form-row input, .form-row select, .form-row textarea { width: 100%; padding: 0.5rem 0.6rem; border: 1px solid #c8cdd8; border-radius: 4px; font-size: 0.9rem; font-family: inherit; transition: border-color 0.15s; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: #6b6fa8; box-shadow: 0 0 0 2px rgba(107,111,168,0.12); }
.form-row textarea { height: 72px; resize: vertical; }
input[type=checkbox] { width: auto; accent-color: #1a2744; }

/* ---- PARTS AUTOCOMPLETE ---- */
.parts-wrap { position: relative; margin-bottom: 0.5rem; }
.parts-wrap input { width: 100%; padding: 0.5rem 0.6rem; border: 1px solid #c8cdd8; border-radius: 4px; font-size: 0.9rem; font-family: inherit; }
.parts-results { border: 1px solid #c8cdd8; background: white; max-height: 200px; overflow-y: auto; position: absolute; z-index: 50; width: 100%; top: 100%; left: 0; box-shadow: 0 4px 14px rgba(26,39,68,0.14); border-radius: 0 0 4px 4px; }
.parts-results div { padding: 0.55rem 0.6rem; cursor: pointer; border-bottom: 1px solid #eef0f6; font-size: 0.9rem; }
.parts-results div:hover, .parts-results div:active { background: #e8eaf8; }

/* ---- TABLES ---- */
table { width: 100%; border-collapse: collapse; font-size: 0.87rem; margin-top: 0.4rem; }
th { background: #f2f4f8; text-align: left; padding: 0.4rem 0.5rem; font-weight: 600; color: #4a5070; font-size: 0.8rem; border-bottom: 2px solid #dde1ea; }
td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #eef0f6; }

/* ---- MESSAGES ---- */
.msg { padding: 0.5rem 0.7rem; margin-bottom: 0.5rem; font-size: 0.87rem; border-radius: 4px; }
.msg.success { background: #d6f2e0; border: 1px solid #8cd8aa; color: #1a5c30; }
.msg.error   { background: #ffe0e0; border: 1px solid #f4aaaa; color: #800; }

/* ---- SECTION TITLE ---- */
.section-title { font-weight: 600; font-size: 0.82rem; color: #6b6fa8; text-transform: uppercase; letter-spacing: 0.05em; margin: 0.9rem 0 0.45rem; border-bottom: 1px solid #eef0f6; padding-bottom: 0.3rem; }

/* ---- STATUS BADGES ---- */
.status-badge { display: inline-block; padding: 0.18rem 0.55rem; font-size: 0.76rem; font-weight: 600; border-radius: 20px; }
.status-Scheduled      { background: #e4eaf8; color: #1a2744; }
.status-In-Progress    { background: #d6f2e0; color: #1a5c30; }
.status-Pending-Review { background: #fff8c0; color: #6b5a00; }
.status-Approved       { background: #d6f2e0; color: #1a5c30; }
.status-Quoted         { background: #fff3d6; color: #7a4800; }
.status-Awaiting-Parts { background: #ffe8cc; color: #7a3800; }
.status-Flagged        { background: #ffe0e0; color: #900; }

/* ---- CONFIRM PANEL ---- */
.confirm-panel { background: #f8f9fc; border: 1px solid #dde1ea; border-radius: 5px; padding: 1rem; margin-top: 0.8rem; }
.confirm-panel .confirm-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.6rem; color: #1a2744; }
.confirm-row { display: flex; justify-content: space-between; font-size: 0.88rem; padding: 0.2rem 0; border-bottom: 1px solid #eef0f6; }
.confirm-row:last-of-type { border-bottom: none; }
</style>
</head>
<body>
<header>
  <h1>Faith Lock &amp; Safe &nbsp;|&nbsp; Field View</h1>
  <button class="logout" onclick="logout()">Sign Out</button>
</header>

<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="showTab('jobs')">My Jobs</div>
    <div class="tab" onclick="showTab('newjob')">+ New Job</div>
    <div class="tab" onclick="showTab('newcustomer')">+ New Customer</div>
  </div>

  <!-- ---- MY JOBS TAB ---- -->
  <div id="tab-jobs">
    <div class="filters">
      <button class="filter-btn" onclick="setFilter('today',this)">Today</button>
      <button class="filter-btn" onclick="setFilter('week',this)">This Week</button>
      <button class="filter-btn active" onclick="setFilter('open',this)">All Open</button>
    </div>
    <div id="jobs-list"><p style="color:#888">Loading...</p></div>
  </div>

  <!-- ---- NEW JOB TAB ---- -->
  <div id="tab-newjob" style="display:none">
    <div class="card">
      <h3>Log Unscheduled Job</h3>
      <div class="form-row"><label>Account</label>
        <select id="nj-account" onchange="loadSubAccounts('nj')"><option value="">Select account...</option></select>
      </div>
      <div class="form-row"><label>Sub-Account</label>
        <select id="nj-subaccount"><option value="">None</option></select>
      </div>
      <div class="form-row"><label>Job Type</label>
        <select id="nj-jobtype"><option value="">Select type...</option></select>
      </div>
      <div class="form-row"><label>Date</label><input type="date" id="nj-date"></div>
      <div class="form-row"><label>Scope</label><textarea id="nj-scope"></textarea></div>
      <div class="form-section">
        <div class="section-title">Completion Details</div>
        <div class="form-row"><label>Time In</label>
          <div style="display:flex;gap:0.4rem">
            <input type="datetime-local" id="nj-timein" style="flex:1">
            <button type="button" class="btn btn-secondary" onclick="document.getElementById('nj-timein').value=nowLocal()" style="white-space:nowrap;padding:0.4rem 0.7rem">Now</button>
          </div>
        </div>
        <div class="form-row"><label>Time Out</label>
          <div style="display:flex;gap:0.4rem">
            <input type="datetime-local" id="nj-timeout" style="flex:1">
            <button type="button" class="btn btn-secondary" onclick="document.getElementById('nj-timeout').value=nowLocal()" style="white-space:nowrap;padding:0.4rem 0.7rem">Now</button>
          </div>
        </div>
        <div class="form-row"><label>Payment Type</label>
          <select id="nj-paytype">
            <option value="">Select...</option>
            <option>Cash</option><option>Check</option><option>Card</option><option>Invoice</option>
          </select>
        </div>
        <div class="form-row"><label>Payment Detail</label><input type="text" id="nj-paydetail"></div>
        <div class="form-row"><label>Parts Used</label>
          <div class="parts-wrap">
            <input type="text" id="nj-partsearch" placeholder="Type to search parts..." oninput="searchParts('nj')" autocomplete="off">
            <div class="parts-results" id="nj-parts-results" style="display:none"></div>
          </div>
          <table id="nj-parts-table"><thead><tr><th>Part</th><th>Qty</th><th></th></tr></thead><tbody></tbody></table>
        </div>
        <div class="form-row"><label>Labor</label>
          <div style="display:flex;gap:0.4rem;margin-bottom:0.4rem;flex-wrap:wrap">
            <select id="nj-labortype" style="flex:2;padding:0.5rem;border:1px solid #c8cdd8;border-radius:4px"><option value="">Select type...</option></select>
            <input type="number" id="nj-laborhours" placeholder="Hrs" style="width:70px;padding:0.5rem;border:1px solid #c8cdd8;border-radius:4px">
            <button class="btn btn-secondary" onclick="addLabor('nj')">Add</button>
          </div>
          <table id="nj-labor-table"><thead><tr><th>Type</th><th>Hours</th><th></th></tr></thead><tbody></tbody></table>
        </div>
        <div class="form-row"><label>Tech Notes</label><textarea id="nj-notes"></textarea></div>
        <div class="form-row"><label><input type="checkbox" id="nj-followup"> Flag for Follow-up</label></div>
        <div class="form-row"><label>Photos</label>
          <input type="file" id="nj-photos" accept="image/*" multiple onchange="showPhotoPreview('nj-photos','nj-photo-preview')">
          <div id="nj-photo-preview" style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.5rem"></div>
        </div>
      </div>
      <div id="nj-msg" style="margin-top:0.6rem"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;padding:0.7rem;font-size:0.95rem" onclick="submitNewJob()">Submit Job</button>
    </div>
  </div>

  <!-- ---- NEW CUSTOMER TAB ---- -->
  <div id="tab-newcustomer" style="display:none">
    <div class="card">
      <h3>Submit New Customer</h3>
      <p style="font-size:0.85rem;color:#5a6075;margin-bottom:0.8rem">Admin will add this to the permanent account list.</p>
      <div class="form-row"><label>Customer Name</label><input type="text" id="nc-name"></div>
      <div class="form-row"><label>Address</label><input type="text" id="nc-address"></div>
      <div class="form-row"><label>Phone</label><input type="text" id="nc-phone"></div>
      <div class="form-row"><label>Notes</label><textarea id="nc-notes"></textarea></div>
      <div id="nc-msg" style="margin-top:0.5rem"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:0.4rem;padding:0.7rem;font-size:0.95rem" onclick="submitNewCustomer()">Submit</button>
    </div>
  </div>
</div>

<!-- ---- JOB DETAIL MODAL ---- -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;overflow-y:auto">
  <div style="background:white;max-width:640px;margin:0 auto;padding:1.4rem 1.2rem;position:relative;min-height:100vh">
    <button onclick="closeModal()" style="position:absolute;top:0.75rem;right:0.75rem;background:#eaecf4;border:none;font-size:0.9rem;cursor:pointer;border-radius:3px;padding:0.3rem 0.7rem;color:#333">Close</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ============================================================
// tech.html — Faith Lock & Safe Field View
// ============================================================

let currentUser  = null;
let currentFilter = 'open';
let modalJobId   = null;

let modalParts = [], modalLabor = [];
let njParts    = [], njLabor    = [];

let allParts      = [];
let allLaborTypes = [];
let allAccounts   = [];
let allJobTypes   = [];

let allPrimaryContactsCache = {};


// ---- INIT ----
async function init() {
  try {
    const { data: { session }, error: sessErr } = await db.auth.getSession();
    if (sessErr) throw sessErr;
    if (!session) { window.location.href = 'index.html'; return; }
    currentUser = session.user;
    await Promise.all([loadRefData(), loadJobs()]);
  } catch (err) {
    document.getElementById('jobs-list').innerHTML =
      `<div class="msg error"><strong>Load error:</strong> ${err.message || JSON.stringify(err)}<br>
       <span style="font-size:0.82rem">Try signing out and back in.</span></div>`;
    console.error('tech init error:', err);
  }
}


// ---- REFERENCE DATA ----
async function loadRefData() {
  const [p, l, a, jt] = await Promise.all([
    db.from('parts').select('id,part_name,category,unit').eq('active', true).order('part_name'),
    db.from('labor_types').select('id,labor_type_name,hourly_rate').order('labor_type_name'),
    db.from('accounts').select('id,account_name,parent_account_id').eq('active', true).order('account_name'),
    db.from('job_types').select('id,job_type_name,category').eq('active', true).order('job_type_name')
  ]);
  allParts      = p.data  || [];
  allLaborTypes = l.data  || [];
  allAccounts   = a.data  || [];
  allJobTypes   = jt.data || [];

  populateSelect('nj-account',   allAccounts.filter(a => !a.parent_account_id), 'id', 'account_name', 'Select account...');
  populateSelect('nj-jobtype',   allJobTypes,   'id', 'job_type_name',   'Select type...');
  populateSelect('nj-labortype', allLaborTypes, 'id', 'labor_type_name', 'Select type...');
  document.getElementById('nj-date').value = today();
}


// ---- JOB LIST ----
async function loadJobs() {
  const list = document.getElementById('jobs-list');
  list.innerHTML = '<p style="color:#888">Loading...</p>';
  try {
    const { data: techRow } = await db.from('techs').select('id').eq('user_id', currentUser.id).maybeSingle();
    const techRowId = techRow?.id || null;

    let query = db.from('jobs')
      .select(`id, job_date, status, scope, site_notes, is_fixed_price, quote_amount,
               work_order_number, purchase_order_number, account_id,
               assigned_tech_ids, lead_tech_id,
               accounts!jobs_account_id_fkey(account_name, address),
               sub:accounts!jobs_sub_account_id_fkey(account_name),
               job_types(job_type_name),
               job_completions(id,tech_notes,follow_up_flag,submitted_at),
               job_line_items(id,item_type,item_id,quantity),
               job_visits(id,visit_number,visit_date)`)
      .not('status', 'in', '("Cancelled","Approved")');

    if (techRowId) query = query.contains('assigned_tech_ids', [techRowId]);

    if (currentFilter === 'today') query = query.eq('job_date', today());
    else if (currentFilter === 'week') query = query.gte('job_date', weekStart());

    const { data, error } = await query.order('job_date', { ascending: true });
    if (error) throw error;

    const myJobs = data || [];
    if (!myJobs.length) { list.innerHTML = '<p style="color:#888">No jobs found for this period.</p>'; return; }

    // Pre-fetch primary contacts in a single batch query to avoid N+1 problem
    const accountIds = [...new Set(myJobs.map(j => j.account_id).filter(Boolean))];
    allPrimaryContactsCache = {};
    if (accountIds.length) {
      const { data: contacts } = await db.from('account_contacts')
        .select('account_id,contact_name,work_phone,cell_phone,is_primary')
        .in('account_id', accountIds).eq('active', true).eq('is_primary', true);
      (contacts || []).forEach(c => { allPrimaryContactsCache[c.account_id] = c; });
    }

    list.innerHTML = myJobs.map(j => jobCard(j)).join('');
  } catch (err) {
    list.innerHTML = `<div class="msg error"><strong>Error loading jobs:</strong> ${err.message}</div>`;
    console.error('loadJobs error:', err);
  }
}

function jobCard(j) {
  const account   = j.accounts?.account_name || 'Unknown Account';
  const sub       = j.sub?.account_name ? ` / ${j.sub.account_name}` : '';
  const comp      = j.job_completions?.[0];
  const submitted = !!comp;
  const visits    = j.job_visits || [];

  const statusBadge = `<span class="status-badge status-${j.status.replace(/ /g,'-')}">${j.status}</span>`;
  const visitLine   = visits.length > 1
    ? `<div class="meta">Visit ${visits.length} of ${visits.length}</div>` : '';

  const fixedBanner = j.is_fixed_price
    ? `<div class="fixed-banner">FIXED PRICE | Quoted: $${Number(j.quote_amount||0).toFixed(2)} | Do not exceed scope without calling Rich.</div>` : '';

  const pc = allPrimaryContactsCache[j.account_id];
  const contactLine = pc
    ? `<div style="font-size:0.83rem;color:#1a3070;margin-bottom:0.3rem">
         Contact: <strong>${pc.contact_name}</strong>
         ${pc.work_phone ? ` | Work: ${pc.work_phone}` : ''}
         ${pc.cell_phone ? ` | Cell: ${pc.cell_phone}` : ''}
       </div>` : '';

  const addrLine = j.accounts?.address
    ? `<div style="font-size:0.83rem;margin-bottom:0.3rem">${mapsLink(j.accounts.address)}</div>` : '';

  const expectedParts  = (j.job_line_items||[]).filter(i => i.item_type === 'Part');
  const expectedLabor  = (j.job_line_items||[]).filter(i => i.item_type === 'Labor');
  const expectedBanner = (expectedParts.length || expectedLabor.length) && !submitted
    ? `<div class="expected-banner">Expected: ${expectedParts.length} part type(s), ${expectedLabor.length} labor entry(ies) pre-loaded in the form.</div>` : '';

  const wopo = [j.work_order_number ? `WO: ${j.work_order_number}` : '', j.purchase_order_number ? `PO: ${j.purchase_order_number}` : ''].filter(Boolean).join(' | ');

  const actionBtn = submitted
    ? `<button class="btn btn-secondary" onclick="openJobDetail('${j.id}')">View / Add Photos</button>
       <button class="btn btn-warn" onclick="unsubmit('${j.id}','${comp.id}')">Unsubmit</button>`
    : `<button class="btn btn-primary" style="padding:0.55rem 1.2rem" onclick="openJobDetail('${j.id}')">Job Details</button>`;

  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.4rem">
      <h3>${account}${sub}</h3>
      ${statusBadge}
    </div>
    <div class="meta">${formatDate(j.job_date)} | ${j.job_types?.job_type_name || ''}</div>
    ${visitLine}
    ${wopo ? `<div class="meta">${wopo}</div>` : ''}
    ${addrLine}
    ${contactLine}
    ${fixedBanner}
    ${expectedBanner}
    ${j.scope ? `<p style="font-size:0.85rem;margin:0.4rem 0;color:#333"><strong>Scope:</strong> ${j.scope}</p>` : ''}
    ${submitted ? '<p style="font-size:0.83rem;color:#2a7a4a;font-weight:600;margin:0.3rem 0">Submitted -- awaiting review.</p>' : ''}
    <div style="margin-top:0.7rem">${actionBtn}</div>
  </div>`;
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadJobs();
}

async function unsubmit(jobId, compId) {
  if (!confirm('Remove your submission? The job will return to Scheduled. Only do this if Rich has not yet reviewed it.')) return;
  await db.from('job_completions').delete().eq('id', compId);
  await db.from('job_line_items').delete().eq('job_id', jobId);
  await db.from('jobs').update({ status: 'Scheduled', updated_at: new Date().toISOString() }).eq('id', jobId);
  loadJobs();
}

function showTab(name) {
  ['jobs','newjob','newcustomer'].forEach(t =>
    document.getElementById(`tab-${t}`).style.display = t === name ? '' : 'none');
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', ['jobs','newjob','newcustomer'][i] === name));
}


// ---- JOB DETAIL MODAL ----
async function openJobDetail(jobId) {
  modalJobId = jobId;
  modalParts = [];
  modalLabor = [];

  const { data: job } = await db.from('jobs')
    .select(`*, accounts!jobs_account_id_fkey(account_name, address, phone, instructions),
             sub:accounts!jobs_sub_account_id_fkey(account_name),
             job_types(job_type_name),
             job_completions(id,time_in,time_out,payment_type,payment_detail,follow_up_flag,tech_notes,submitted_at),
             job_line_items(id,item_type,item_id,quantity)`)
    .eq('id', jobId).single();

  let contactHtml = '';
  if (job.account_id) {
    const { data: contacts } = await db.from('account_contacts')
      .select('*').eq('account_id', job.account_id).eq('active', true)
      .order('is_primary', { ascending: false });

    if (contacts?.length) {
      const primary   = contacts.find(c => c.is_primary) || contacts[0];
      const secondary = contacts.find(c => !c.is_primary);
      let ch = `<div class="contact-info"><strong>Contact:</strong> ${primary.contact_name}`;
      if (primary.title)      ch += ` | ${primary.title}`;
      if (primary.company)    ch += ` | ${primary.company}`;
      ch += '<br>';
      if (primary.work_phone) ch += `Work: ${primary.work_phone} &nbsp;`;
      if (primary.cell_phone) ch += `Cell: ${primary.cell_phone} &nbsp;`;
      if (primary.email)      ch += primary.email;
      if (primary.notes)      ch += `<br><em style="font-size:0.82rem">${primary.notes}</em>`;
      if (secondary) {
        ch += `<br><span style="font-size:0.83rem"><strong>Secondary:</strong> ${secondary.contact_name}`;
        if (secondary.work_phone) ch += ` | Work: ${secondary.work_phone}`;
        if (secondary.cell_phone) ch += ` | Cell: ${secondary.cell_phone}`;
        ch += '</span>';
      }
      ch += '</div>';
      contactHtml = ch;
    } else if (job.accounts?.phone) {
      contactHtml = `<div class="contact-info"><strong>Phone:</strong> ${job.accounts.phone}</div>`;
    }
  }

  const comp      = job.job_completions?.[0];
  const submitted = !!comp;

  (job.job_line_items || []).forEach(i => {
    if (i.item_type === 'Part') {
      const p = allParts.find(x => x.id === i.item_id);
      if (p) modalParts.push({ id: p.id, name: p.part_name, unit: p.unit||'', qty: i.quantity });
    } else if (i.item_type === 'Labor') {
      const l = allLaborTypes.find(x => x.id === i.item_id);
      if (l) modalLabor.push({ id: l.id, name: l.labor_type_name, hours: i.quantity });
    }
  });

  const laborOpts = allLaborTypes.map(l => `<option value="${l.id}">${l.labor_type_name}</option>`).join('');

  const fixedBanner = job.is_fixed_price
    ? `<div class="fixed-banner">FIXED PRICE | Quoted: $${Number(job.quote_amount||0).toFixed(2)} | Do not exceed scope without calling Rich.</div>` : '';

  const wopo = [job.work_order_number ? `WO: ${job.work_order_number}` : '', job.purchase_order_number ? `PO: ${job.purchase_order_number}` : ''].filter(Boolean).join(' | ');

  const addrHtml = job.accounts?.address
    ? `<div class="address-info"><strong>Address:</strong> ${mapsLink(job.accounts.address)}</div>` : '';

  const hasExpected = (job.job_line_items||[]).some(i => i.item_type === 'Part' || i.item_type === 'Labor');
  const preNote = hasExpected
    ? `<p style="font-size:0.83rem;color:#1a3070;margin:0 0 0.5rem;background:#eaf2ff;border-radius:3px;padding:0.4rem 0.6rem">Expected parts and labor are pre-loaded. Adjust quantities or add/remove as needed.</p>`
    : '';

  let completionSection = '';
  if (submitted) {
    completionSection = `
      <div class="form-section">
        <div class="section-title">Submitted Details</div>
        <div class="meta">Time In: ${comp.time_in ? new Date(comp.time_in).toLocaleString() : '--'}</div>
        <div class="meta">Time Out: ${comp.time_out ? new Date(comp.time_out).toLocaleString() : '--'}</div>
        <div class="meta">Payment: ${comp.payment_type || '--'} ${comp.payment_detail || ''}</div>
        ${comp.tech_notes ? `<div class="meta">Notes: ${comp.tech_notes}</div>` : ''}
        <button class="btn btn-secondary" style="width:100%;margin-top:0.8rem" onclick="openAddNote('${jobId}')">Add Note</button>
      </div>
      <div class="form-section">
        <div class="section-title">Photos</div>
        <div id="tech-job-photos-${jobId}" style="margin-bottom:0.6rem">
          <span style="font-size:0.83rem;color:#aaa">Loading photos...</span>
        </div>
        <div class="form-row"><label>Add Photos</label>
          <input type="file" id="extra-photos-${jobId}" accept="image/*" multiple>
        </div>
        <button class="btn btn-secondary" style="width:100%" onclick="uploadExtraPhotos('${jobId}')">Upload More Photos</button>
        <div id="extra-photo-msg-${jobId}" style="font-size:0.83rem;color:#2a7a4a;margin-top:0.3rem"></div>
      </div>`;
  } else {
    completionSection = `
      <div class="form-section">
        <div class="section-title">Complete This Job</div>
        <div class="form-row"><label>Time In</label>
          <div style="display:flex;gap:0.4rem">
            <input type="datetime-local" id="m-timein" style="flex:1">
            <button type="button" class="btn btn-secondary" onclick="document.getElementById('m-timein').value=nowLocal()" style="white-space:nowrap;padding:0.4rem 0.7rem">Now</button>
          </div>
        </div>
        <div class="form-row"><label>Time Out</label>
          <div style="display:flex;gap:0.4rem">
            <input type="datetime-local" id="m-timeout" style="flex:1">
            <button type="button" class="btn btn-secondary" onclick="document.getElementById('m-timeout').value=nowLocal()" style="white-space:nowrap;padding:0.4rem 0.7rem">Now</button>
          </div>
        </div>
      </div>
      <div class="form-section">
        <div class="section-title">Parts Used</div>
        ${preNote}
        <div class="parts-wrap">
          <input type="text" id="m-partsearch" placeholder="Type to search parts..." oninput="searchParts('m')" autocomplete="off">
          <div class="parts-results" id="m-parts-results" style="display:none"></div>
        </div>
        <table id="m-parts-table"><thead><tr><th>Part</th><th>Qty</th><th></th></tr></thead><tbody></tbody></table>
      </div>
      <div class="form-section">
        <div class="section-title">Labor</div>
        <div style="display:flex;gap:0.4rem;margin-bottom:0.4rem;flex-wrap:wrap">
          <select id="m-labortype" style="flex:2;padding:0.5rem;border:1px solid #c8cdd8;border-radius:4px;min-width:150px"><option value="">Select type...</option>${laborOpts}</select>
          <input type="number" id="m-laborhours" placeholder="Hrs" style="width:70px;padding:0.5rem;border:1px solid #c8cdd8;border-radius:4px">
          <button class="btn btn-secondary" onclick="addLabor('m')">Add</button>
        </div>
        <table id="m-labor-table"><thead><tr><th>Type</th><th>Hours</th><th></th></tr></thead><tbody></tbody></table>
      </div>
      <div class="form-section">
        <div class="form-row"><label>Payment Type</label>
          <select id="m-paytype"><option value="">Select...</option><option>Cash</option><option>Check</option><option>Card</option><option>Invoice</option></select>
        </div>
        <div class="form-row"><label>Payment Detail (check number, last 4, etc.)</label><input type="text" id="m-paydetail"></div>
      </div>
      <div class="form-section">
        <div class="form-row"><label>Tech Notes</label><textarea id="m-notes"></textarea></div>
        <div class="form-row"><label><input type="checkbox" id="m-followup"> Flag for Follow-up</label></div>
        <div class="form-row"><label>Photos</label>
          <input type="file" id="m-photos" accept="image/*" multiple onchange="showPhotoPreview('m-photos','m-photo-preview')">
          <div id="m-photo-preview" style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.5rem"></div>
        </div>
      </div>
      <div class="form-section">
        <div class="section-title">Quote Form <span style="font-weight:400;text-transform:none;font-size:0.78rem;color:#888">(leave blank if not a quote job)</span></div>
        <div class="form-row"><label>Scope Observed</label><textarea id="m-quote-scope"></textarea></div>
        <div class="form-row"><label>Materials / Notes for Rich</label><textarea id="m-quote-materials"></textarea></div>
      </div>
      <div id="m-msg" style="margin-top:0.6rem"></div>
      <div id="m-confirm-panel" style="display:none" class="confirm-panel">
        <div class="confirm-title">Review before submitting</div>
        <div id="m-confirm-body" style="margin-bottom:0.8rem"></div>
        <button class="btn btn-green" style="width:100%;padding:0.7rem;font-size:0.95rem" onclick="submitCompletion()">Confirm and Submit</button>
        <button class="btn btn-secondary" style="width:100%;margin-top:0.4rem" onclick="closeSubmitConfirm()">Go Back</button>
      </div>
      <button id="m-submit-btn" class="btn btn-green" style="width:100%;margin-top:0.9rem;padding:0.85rem;font-size:1rem" onclick="showSubmitConfirm()">Submit Completion</button>`;
  }

  document.getElementById('modal-content').innerHTML = `
    <h3 style="margin:0.3rem 0 0.2rem;color:#1a2744">${job.accounts?.account_name||''}${job.sub?.account_name ? ' / '+job.sub.account_name : ''}</h3>
    <div class="meta">${formatDate(job.job_date)} | ${job.job_types?.job_type_name||''}</div>
    ${wopo ? `<div class="meta">${wopo}</div>` : ''}
    ${addrHtml}
    ${contactHtml}
    ${fixedBanner}
    ${job.scope      ? `<p style="font-size:0.87rem;margin:0.4rem 0"><strong>Scope:</strong> ${job.scope}</p>` : ''}
    ${job.site_notes ? `<p style="font-size:0.87rem;margin:0.4rem 0"><strong>Site Notes:</strong> ${job.site_notes}</p>` : ''}
    ${submitted ? '<div class="msg success">Job submitted. Awaiting admin review.</div>' : ''}
    ${completionSection}
  `;

  if (!submitted) {
    renderPartsTable('m');
    renderLaborTable('m');
    document.getElementById('m-timein').value = nowLocal();
  } else {
    loadTechJobPhotos(jobId);
  }

  document.getElementById('modal').style.display = '';
  window.scrollTo(0, 0);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}


// ---- PHOTOS ----
async function loadTechJobPhotos(jobId) {
  const grid = document.getElementById(`tech-job-photos-${jobId}`);
  if (!grid) return;
  grid.innerHTML = '<span style="font-size:0.83rem;color:#aaa">Loading...</span>';
  const { data: photos } = await db.from('job_photos')
    .select('id,storage_path,file_name,uploaded_at').eq('job_id', jobId)
    .order('uploaded_at', { ascending: false });
  const withUrls = await fetchPhotoUrls(photos || []);
  renderPhotoGrid(grid, withUrls, false);
}

async function uploadExtraPhotos(jobId) {
  const input = document.getElementById(`extra-photos-${jobId}`);
  const msgEl = document.getElementById(`extra-photo-msg-${jobId}`);
  if (!input?.files?.length) { msgEl.textContent = 'No files selected.'; return; }
  msgEl.textContent = 'Uploading...';
  await uploadPhotos(input.files, jobId);
  input.value = '';
  msgEl.textContent = 'Uploaded.';
  await loadTechJobPhotos(jobId);
}


// ---- PARTS SEARCH ----
function searchParts(prefix) {
  const input   = document.getElementById(`${prefix}-partsearch`);
  const results = document.getElementById(`${prefix}-parts-results`);
  if (!input || !results) return;
  const q = input.value.toLowerCase().trim();
  if (!q) { results.style.display = 'none'; return; }
  const matches = allParts.filter(p => p.part_name.toLowerCase().includes(q)).slice(0, 12);
  if (!matches.length) { results.style.display = 'none'; return; }
  results.innerHTML = matches.map(p =>
    `<div data-id="${p.id}"
          data-name="${p.part_name.replace(/"/g,'&quot;')}"
          data-unit="${(p.unit||'').replace(/"/g,'&quot;')}">
      ${p.part_name}${p.unit ? ` (${p.unit})` : ''}${p.category ? ` | ${p.category}` : ''}
    </div>`).join('');
  results.style.display = 'block';
  results.querySelectorAll('div').forEach(div => {
    div.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      addPart(prefix, div.dataset.id, div.dataset.name, div.dataset.unit);
    });
  });
}

document.addEventListener('click', e => {
  if (!e.target.closest('.parts-wrap'))
    document.querySelectorAll('.parts-results').forEach(el => el.style.display = 'none');
});

function addPart(prefix, id, name, unit) {
  const store = prefix === 'm' ? modalParts : njParts;
  const ex = store.find(p => p.id === id);
  if (ex) ex.qty += 1; else store.push({ id, name, unit, qty: 1 });
  renderPartsTable(prefix);
  document.getElementById(`${prefix}-parts-results`).style.display = 'none';
  document.getElementById(`${prefix}-partsearch`).value = '';
}

function removePart(prefix, idx) {
  (prefix === 'm' ? modalParts : njParts).splice(idx, 1);
  renderPartsTable(prefix);
}

function renderPartsTable(prefix) {
  const store = prefix === 'm' ? modalParts : njParts;
  const tbody = document.querySelector(`#${prefix}-parts-table tbody`);
  if (!tbody) return;
  tbody.innerHTML = store.map((p, i) =>
    `<tr>
       <td>${p.name}</td>
       <td><input type="number" min="0.1" step="0.1" value="${p.qty}"
             style="width:65px;padding:0.3rem;border:1px solid #c8cdd8;border-radius:3px;font-size:0.9rem"
             onchange="${prefix === 'm' ? 'modalParts' : 'njParts'}[${i}].qty=parseFloat(this.value)||1"></td>
       <td><button onclick="removePart('${prefix}',${i})"
             style="border:none;background:none;cursor:pointer;color:#a02020;font-weight:bold;font-size:1rem;padding:0.2rem 0.4rem">X</button></td>
     </tr>`
  ).join('') || '<tr><td colspan="3" style="color:#aaa;font-style:italic;font-size:0.83rem">None added</td></tr>';
}


// ---- LABOR ----
function addLabor(prefix) {
  const typeId = document.getElementById(`${prefix}-labortype`).value;
  const hours  = parseFloat(document.getElementById(`${prefix}-laborhours`).value);
  if (!typeId || isNaN(hours) || hours <= 0) return;
  const lt    = allLaborTypes.find(l => l.id === typeId);
  const store = prefix === 'm' ? modalLabor : njLabor;
  const ex    = store.find(l => l.id === typeId);
  if (ex) ex.hours = hours; else store.push({ id: typeId, name: lt.labor_type_name, hours });
  renderLaborTable(prefix);
  document.getElementById(`${prefix}-laborhours`).value = '';
}

function removeLabor(prefix, idx) {
  (prefix === 'm' ? modalLabor : njLabor).splice(idx, 1);
  renderLaborTable(prefix);
}

function renderLaborTable(prefix) {
  const store = prefix === 'm' ? modalLabor : njLabor;
  const tbody = document.querySelector(`#${prefix}-labor-table tbody`);
  if (!tbody) return;
  tbody.innerHTML = store.map((l, i) =>
    `<tr>
       <td>${l.name}</td>
       <td>${l.hours} hr</td>
       <td><button onclick="removeLabor('${prefix}',${i})"
             style="border:none;background:none;cursor:pointer;color:#a02020;font-weight:bold;font-size:1rem;padding:0.2rem 0.4rem">X</button></td>
     </tr>`
  ).join('') || '<tr><td colspan="3" style="color:#aaa;font-style:italic;font-size:0.83rem">None added</td></tr>';
}


// ---- SUBMIT CONFIRM ----
function showSubmitConfirm() {
  const timeIn  = document.getElementById('m-timein')?.value;
  const timeOut = document.getElementById('m-timeout')?.value;
  const payType = document.getElementById('m-paytype')?.value;

  const warn = (!timeIn || !timeOut)
    ? '<div style="background:#fff3d6;border:1px solid #e0c060;padding:0.4rem 0.6rem;margin-bottom:0.6rem;font-size:0.85rem;border-radius:4px;color:#7a4800">Time in/out not entered -- are you sure?</div>'
    : '';

  const fmtTime = v => v ? new Date(v).toLocaleString() : '--';

  document.getElementById('m-confirm-body').innerHTML = `
    ${warn}
    <div class="confirm-row"><span>Time In</span><span>${fmtTime(timeIn)}</span></div>
    <div class="confirm-row"><span>Time Out</span><span>${fmtTime(timeOut)}</span></div>
    <div class="confirm-row"><span>Parts</span><span>${modalParts.length} item(s)</span></div>
    <div class="confirm-row"><span>Labor</span><span>${modalLabor.length} entr${modalLabor.length === 1 ? 'y' : 'ies'}</span></div>
    <div class="confirm-row"><span>Payment</span><span>${payType || '--'}</span></div>`;

  document.getElementById('m-confirm-panel').style.display = '';
  document.getElementById('m-submit-btn').style.display    = 'none';
}

function closeSubmitConfirm() {
  document.getElementById('m-confirm-panel').style.display = 'none';
  document.getElementById('m-submit-btn').style.display    = '';
}


// ---- SUBMIT COMPLETION ----
async function submitCompletion() {
  const msg = document.getElementById('m-msg');
  msg.innerHTML = '';

  await db.from('job_line_items').delete().eq('job_id', modalJobId);

  const { error: ce } = await db.from('job_completions').insert({
    job_id:         modalJobId,
    time_in:        document.getElementById('m-timein').value    || null,
    time_out:       document.getElementById('m-timeout').value   || null,
    payment_type:   document.getElementById('m-paytype').value   || null,
    payment_detail: document.getElementById('m-paydetail').value || null,
    follow_up_flag: document.getElementById('m-followup').checked,
    tech_notes:     document.getElementById('m-notes').value     || null,
    submitted_by:   currentUser.id
  });
  if (ce) { msg.innerHTML = `<div class="msg error">${ce.message}</div>`; return; }

  const lineItems = [
    ...modalParts.map(p => ({ job_id: modalJobId, item_type: 'Part',  item_id: p.id, quantity: p.qty,   unit_cost: 0 })),
    ...modalLabor.map(l => ({ job_id: modalJobId, item_type: 'Labor', item_id: l.id, quantity: l.hours, unit_cost: 0 }))
  ];
  if (lineItems.length) await db.from('job_line_items').insert(lineItems);

  await db.from('jobs').update({ status: 'Pending Review', updated_at: new Date().toISOString() }).eq('id', modalJobId);
  await uploadPhotos(document.getElementById('m-photos').files, modalJobId);

  const qScope = document.getElementById('m-quote-scope').value;
  const qMat   = document.getElementById('m-quote-materials').value;
  if (qScope || qMat) {
    await db.from('quote_forms').insert({
      job_id:         modalJobId,
      scope_observed: qScope || null,
      materials_json: qMat ? [{ notes: qMat }] : null,
      locked_at:      new Date().toISOString(),
      created_by:     currentUser.id
    });
  }

  msg.innerHTML = '<div class="msg success">Job submitted successfully.</div>';
  setTimeout(() => { closeModal(); loadJobs(); }, 1200);
}


// ---- PHOTO PREVIEW ----
function showPhotoPreview(inputId, previewId) {
  const input   = document.getElementById(inputId);
  const preview = document.getElementById(previewId);
  if (!input || !preview) return;
  preview.innerHTML = '';
  Array.from(input.files).forEach((file, idx) => {
    const reader = new FileReader();
    const wrap   = document.createElement('div');
    wrap.style.cssText = 'position:relative;display:inline-block';
    reader.onload = e => {
      wrap.innerHTML =
        `<img src="${e.target.result}" style="width:80px;height:68px;object-fit:cover;border:1px solid #c8cdd8;border-radius:3px;display:block">` +
        `<button onclick="removePhotoFile('${inputId}','${previewId}',${idx})"
          style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:white;border:none;cursor:pointer;font-size:0.75rem;padding:0 5px;line-height:1.6;border-radius:2px">X</button>`;
    };
    reader.readAsDataURL(file);
    preview.appendChild(wrap);
  });
}

function removePhotoFile(inputId, previewId, idx) {
  const input = document.getElementById(inputId);
  const dt    = new DataTransfer();
  Array.from(input.files).forEach((f, i) => { if (i !== idx) dt.items.add(f); });
  input.files = dt.files;
  showPhotoPreview(inputId, previewId);
}

async function uploadPhotos(files, jobId) {
  if (!files || !files.length) return;
  const { data: job } = await db.from('jobs').select('account_id').eq('id', jobId).single();
  for (const file of files) {
    const path    = `${jobId}/${Date.now()}_${file.name}`;
    const resized = await resizeImage(file, 1200);
    const { error } = await db.storage.from('job-photos').upload(path, resized);
    if (error) continue;
    await db.from('job_photos').insert({
      job_id:       jobId,
      account_id:   job?.account_id || null,
      storage_path: path,
      file_name:    file.name,
      uploaded_by:  currentUser.id
    });
  }
}


// ---- ADD NOTE ----
async function openAddNote(jobId) {
  const note = prompt('Add a note to this job:');
  if (!note) return;
  const { data: ex } = await db.from('job_completions').select('id,tech_notes').eq('job_id', jobId).single();
  if (!ex) return;
  const appended = (ex.tech_notes || '') + `\n[${new Date().toLocaleString()}] ${note}`;
  await db.from('job_completions').update({
    tech_notes:     appended,
    last_edited_by: currentUser.id,
    last_edited_at: new Date().toISOString()
  }).eq('id', ex.id);
  alert('Note added.');
  closeModal();
  loadJobs();
}


// ---- SUB-ACCOUNTS ----
function loadSubAccounts(prefix) {
  const parentId = document.getElementById(`${prefix}-account`).value;
  const subs     = allAccounts.filter(a => a.parent_account_id === parentId);
  populateSelect(`${prefix}-subaccount`, subs, 'id', 'account_name', 'None');
}


// ---- NEW JOB ----
async function submitNewJob() {
  const accountId = document.getElementById('nj-account').value;
  const date      = document.getElementById('nj-date').value;
  const msg       = document.getElementById('nj-msg');
  msg.innerHTML   = '';
  if (!accountId || !date) {
    msg.innerHTML = '<div class="msg error">Account and date are required.</div>';
    return;
  }

  const { data: job, error } = await db.from('jobs').insert({
    job_date:          date,
    account_id:        accountId,
    sub_account_id:    document.getElementById('nj-subaccount').value || null,
    job_type_id:       document.getElementById('nj-jobtype').value    || null,
    assigned_tech_ids: [currentUser.id],
    status:            'Pending Review',
    scope:             document.getElementById('nj-scope').value || null,
    created_by:        currentUser.id
  }).select().single();
  if (error) { msg.innerHTML = `<div class="msg error">${error.message}</div>`; return; }

  await db.from('job_completions').insert({
    job_id:         job.id,
    time_in:        document.getElementById('nj-timein').value    || null,
    time_out:       document.getElementById('nj-timeout').value   || null,
    payment_type:   document.getElementById('nj-paytype').value   || null,
    payment_detail: document.getElementById('nj-paydetail').value || null,
    follow_up_flag: document.getElementById('nj-followup').checked,
    tech_notes:     document.getElementById('nj-notes').value     || null,
    submitted_by:   currentUser.id
  });

  const lineItems = [
    ...njParts.map(p => ({ job_id: job.id, item_type: 'Part',  item_id: p.id, quantity: p.qty,   unit_cost: 0 })),
    ...njLabor.map(l => ({ job_id: job.id, item_type: 'Labor', item_id: l.id, quantity: l.hours, unit_cost: 0 }))
  ];
  if (lineItems.length) await db.from('job_line_items').insert(lineItems);
  await uploadPhotos(document.getElementById('nj-photos').files, job.id);

  msg.innerHTML = '<div class="msg success">Job submitted.</div>';
  njParts = []; njLabor = [];
  renderPartsTable('nj'); renderLaborTable('nj');
  setTimeout(() => { showTab('jobs'); loadJobs(); }, 1200);
}


// ---- NEW CUSTOMER ----
async function submitNewCustomer() {
  const name = document.getElementById('nc-name').value.trim();
  const msg  = document.getElementById('nc-msg');
  msg.innerHTML = '';
  if (!name) { msg.innerHTML = '<div class="msg error">Name is required.</div>'; return; }

  const { error } = await db.from('new_customers').insert({
    name,
    address:      document.getElementById('nc-address').value || null,
    phone:        document.getElementById('nc-phone').value   || null,
    notes:        document.getElementById('nc-notes').value   || null,
    submitted_by: currentUser.id
  });
  if (error) { msg.innerHTML = `<div class="msg error">${error.message}</div>`; return; }

  msg.innerHTML = '<div class="msg success">Submitted. Admin will add to the account list.</div>';
  ['nc-name','nc-address','nc-phone','nc-notes'].forEach(id => document.getElementById(id).value = '');
}
